czny, a w postaci nawrotowej narastanie niesprawności jest większe nıż. po rzutach stwardnienia rozsianego,\nC. w obrazie neuropatologicznym w obszarach destrukcji widoczne są: intensywna demielinizacja, cechy ostrego uszkodzenia aksonów (obecnosć tzw. sferoidów), nekroza z obecnością jam,\nD. zapalenie nerwów wzrokowych i rdzenia kręgowego określa się mianem akwaporynopatii, co wiąże się z obecnością przeciwciał przeciw akwaporynie 4 (AQP4) we krwi i w CSF u około 70% chorych\nE. rozpoznanie to wspiera wykrycie obecności prążków oligkolonalnych w płynie mózgowo-rdzeniowym.", "a": "E. rozpoznanie to wspiera wykrycie obecności prążków oligkolonalnych w płynie mózgowo-rdzeniowym. (egzamin neurologia 2026 cykl A-2.docx, pyt. 81)"}, {"chapter": "Choroby demielinizacyjne", "q": "Które stwierdzenie epidemiologiczne dotyczące SM jest prawdziwe:\nA. Częstość SM rośnie im bliżej równika\nB. Młodzi imigranci (przed 15 r.ż.) nabywają ryzyko SM charakterystyczne dla obszaru docelowego\nC. W obszarze niskiego ryzyka chorobotwórczość przekracza 30/100 000\nD. SM najczęściej dotyczy rasy czarnej i azjatyckiej\nE. Nie ma różnic płciowych w zapadalności na SM", "a": "B. Młodzi imigranci (przed 15 r.ż.) nabywają ryzyko SM charakterystyczne dla obszaru docelowego (egzamin neurologia II 2026 cykl A-3.docx, pyt. 3)"}, {"chapter": "Choroby demielinizacyjne", "q": "Wybierz zdanie, które nieprawidłowo charakteryzuje ADEM- ostre rozsiane zapalenie mózgu i rdzenia (ADEM):\nA. monofazowym, zapalno-demielinizacyjnym schorzeniem OUN o podłożu autoimmunologicznym\nB. patogenezy zmian upatruje się w zjawisku molekularnej mimikry\nC. choroba występuje znacznie częściej u dzieci niż u dorosłych\nD. w badaniu MR obserwuje się symetryczne lub asymetryczne rozsiane zmiany demielinizacyjne w istocie białej półkul, ale nie w miejscach typowych dla SM\nE. częsty jest przebieg rzutowy", "a": "E. częsty jest przebieg rzutowy (egzamin neurologia II 2026 cykl A-3.docx, pyt. 4)"}, {"chapter": "Choroby demielinizacyjne", "q": "Co oznacza obraz “palców Dawsona” w badaniu MR w stwardnieniu rozsianym?\nA. owalne ogniska widoczne w sekwencji T1 z intensywnym pierścieniowatym wzmocnieniem w płatach skroniowych\nB. hiperintensywne ogniska widoczne w sekwencji T2 ułożone prostopadle do komór bocznych, często w obrębie ciała modzelowatego\nC. symetryczne zmiany w jądrach podstawy, typowe dla ADEM\nD. hipointensywne “czarne dziury” w sekwencji T1 świadczące o odwracalnym obrzęku\nE. ogniska wyłącznie w rdzeniu kręgowym na poziomie C-Th", "a": "B. hiperintensywne ogniska widoczne w sekwencji T2 ułożone prostopadle do komór bocznych, często w obrębie ciała modzelowatego (egzamin neurologia II 2026 cykl A-3.docx, pyt. 6)"}, {"chapter": "Choroby demielinizacyjne", "q": "Wybierz zdanie, które nieprawidłowo charakteryzuje chorobę ze spektrum NMOSD - neuromyelitis optica:\nA. jest to autoimmunologiczne, demielinizacyjno-nekrotycznym schorzeniem uszkadzające nerwy wzrokowe i rdzeń kręgowy\nB. po przebytym rzucie choroby pozostaje zwykle znacznego stopnia deficyt neurologiczny, a w postaci nawrotowej narastanie niesprawności jest większe niż po rzutach SM\nC. w obrazie neuropatologicznym w obszarachdestrukcji widoczne są: intensywna demielinizacja, cechy ostrego uszkodzenia aksonów (obecność tzw. sferoidów), nekroza z obecnością jam\nD. zapalenie nerwów wzrokowych i rdzenia kręgowego określa się mianem akwaporynopatii, co wiąże się z obecnością przeciwciał przeciw akwaporynie 4 (AQP4) we krwi i w CSF u około 70% chorych\nE. rozpoznanie to wspiera wykrycie obecności prążków oligoklonalnych w płynie mózgowo-rdzeniowym", "a": "E. rozpoznanie to wspiera wykrycie obecności prążków oligoklonalnych w płynie mózgowo-rdzeniowym (egzamin neurologia II 2026 cykl A-3.docx, pyt. 40)"}, {"chapter": "Choroby demielinizacyjne", "q": "Choroby demielinizacyjne: co trzeba pamiętać o: ten punkt?", "a": "SM: wieloogniskowa demielinizacja OUN, zwykle młodzi dorośli, częściej kobiety; objawy rozsiane w czasie i przestrzeni."}, {"chapter": "Choroby demielinizacyjne", "q": "Choroby demielinizacyjne: co trzeba pamiętać o: Typowe objawy SM?", "a": "Typowe objawy SM: pozagałkowe zapalenie nerwu wzrokowego, zaburzenia czucia, niedowład, ataksja, diplopia, objaw Lhermitte'a, zaburzenia zwieraczy i zmęczenie."}, {"chapter": "Choroby demielinizacyjne", "q": "Choroby demielinizacyjne: co trzeba pamiętać o: Diagnostyka SM?", "a": "Diagnostyka SM: MRI mózgu i rdzenia, prążki oligoklonalne w PMR, potencjały wywołane oraz wykluczenie chorób podobnych."}, {"chapter": "Choroby demielinizacyjne", "q": "Choroby demielinizacyjne: co trzeba pamiętać o: Postacie?", "a": "Postacie: rzutowo-remisyjna, wtórnie postępująca, pierwotnie postępująca i postępująco-rzutowa w starszych klasyfikacjach."}, {"chapter": "Choroby demielinizacyjne", "q": "Choroby demielinizacyjne: co trzeba pamiętać o: ten punkt?", "a": "Rzut SM: nowe lub nasilone objawy neurologiczne trwające ponad 24 h, bez gorączki i infekcji; leczenie rzutu zwykle wysokodawkowymi steroidami."}, {"chapter": "Choroby demielinizacyjne", "q": "Choroby demielinizacyjne: co trzeba pamiętać o: ten punkt?", "a": "SM = czas plus przestrzeń; NMO = wzrok plus długi rdzeń; ADEM = dziecko plus encefalopatia; PML = immunosupresja plus JC."}, {"chapter": "Choroby demielinizacyjne", "q": "Choroby demielinizacyjne: co trzeba pamiętać o: Objaw Lhermitte'a to prąd wzdłuż kręgosłupa przy zgięciu szyi.?", "a": "Objaw Lhermitte'a to prąd wzdłuż kręgosłupa przy zgięciu szyi."}, {"chapter": "Choroby demielinizacyjne", "q": "Choroby demielinizacyjne: co trzeba pamiętać o: ten punkt?", "a": "Prążki oligoklonalne wspierają rozpoznanie SM, ale nie zastępują obrazu klinicznego i MRI."}, {"chapter": "Choroby demielinizacyjne", "q": "Choroby demielinizacyjne: odtwórz fakt ze skryptu zaczynający się od: Białko PrPs (nieprawidłowe) może być przeszczepione, pobrane z pokarmem...", "a": "Białko PrPs (nieprawidłowe) może być przeszczepione, pobrane z pokarmem lub może powstać de novo w wyniku mutacji w genie PRNP na 20. chromosomie."}, {"chapter": "Choroby demielinizacyjne", "q": "Choroby demielinizacyjne: co pamiętasz o: istocie białej OUN, najczęściej w lokalizacji?", "a": "istocie białej OUN, najczęściej w lokalizacji:"}, {"chapter": "Choroby demielinizacyjne", "q": "Choroby demielinizacyjne: odtwórz fakt ze skryptu zaczynający się od: Choroba poniżej 16 r.ż. - dziecięca postać SM; choroba powyżej 50 r.ż....", "a": "Choroba poniżej 16 r.ż. - dziecięca postać SM; choroba powyżej 50 r.ż. - późna postać SM. Średni czas przeżycia od zachorowania to 25-35 lat"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Który z poniższych objawów NIE JEST elementem zespołu parkinsonowskiego:\nA. Sztywność\nB. Bradykinezja\nC. Drżenie spoczynkowe\nD. Spastyczność\nE. Zaburzenia odruchów postawy", "a": "D. Spastyczność (egzamin neurologia 2026 cykl A-2.docx, pyt. 31)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Do typowych objawów pozaruchowych choroby Parkinsona występujących w fazie przedklinicznej NIE NALEŻY/Ą:\nA. Zaburzenia węchu (hiposmia)\nB. Zaburzenie zachowania w fazie snu REM (RBD)\nC. Objawy psychotyczne\nD. Zaburzenia nastroju\nE. Zaparcia", "a": "C. Objawy psychotyczne (egzamin neurologia 2026 cykl A-2.docx, pyt. 32)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Do kryteriów wspierających rozpoznanie choroby Parkinsona NIE NALEŻY :\nA. Bardzo dobra reakcja na leczenie dopaminergiczne\nB. Dwustronny symetryczny parkinsonizm\nC. Występowanie dyskinez wywołanych lewodopa\nD. Utrata węchu\nE. Drżenie spoczynkowe (w trakcie badania lub w wywiadzie)", "a": "B. Dwustronny symetryczny parkinsonizm (egzamin neurologia 2026 cykl A-2.docx, pyt. 33)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Rezonans magnetyczny (MR) wykazujący zanik śródmózgowia, który na obrazach w przekrojach strzałkowych daje obraz tzw. dzioba kolibra lub pingwina jest typowy dla:\nA. Postępującego porażenia nadjądrowego\nB. Zaniku wieloukładowego\nC. Zwyrodnienia korowo podstawnego\nD. Otępienia z ciałami Lewy'ego\nE. Choroby Parkinsona", "a": "A. Postępującego porażenia nadjądrowego (egzamin neurologia 2026 cykl A-2.docx, pyt. 34)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "W którym atypowym parkinsonizmie występują wybitnie asymetryczne objawy z tzw.= „objawem „obcej kończyny\" (alien limb):\nA. Otępieniu z ciałami Lewy ego\nB. Zaniku wieloukładowym\nC. Parkinsonizmie polekowym\nD. Postępującym porażeniu nadjądrowym\nE. Zwyrodnieniu korowo-podstawnym", "a": "E. Zwyrodnieniu korowo-podstawnym (egzamin neurologia 2026 cykl A-2.docx, pyt. 35)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Badanie SPECT z użyciem znacznika DaTSCAN pomaga zróżnicować:\nA. Chorobę Parkinsona i zanik wieloukładowy\nB. Chorobę Parkinsona i parkinsonizm polekowy\nC. Chorobę Parkinsona i drżenie samoistne\nD. i C\nE. і С", "a": "E. і С (egzamin neurologia 2026 cykl A-2.docx, pyt. 36)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "W przypadku wystąpienia dyskinez szczytu dawki w przebiegu choroby\nA. Parkinsona należy:\nB. Zredukować pojedynczą dawkę lewodopy\nC. Zwiększyć pojedynczą dawkę lewodopy\nD. Dolaczyć amantadynę\nE. Odstawić amantadynę\nF. Dolączyć inhibitor COMT\nG. Odstawić inhibitor MAO-B A\nH. 1,4,5\nI. 1,3,6\nJ. 1,4,6\nK. 2,3,6\nL. 1,3,5", "a": "I. 1,3,6 (egzamin neurologia 2026 cykl A-2.docx, pyt. 37)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Drżenie spoczynkowe o częstotliwości 4-6 Hz jest typowe dla:\nA. Pląsawicy Huntingtona\nB. Dystonii\nC. Choroby Parkinsona\nD. Ataksji móżdżkowej\nE. Drżenia samoistnego", "a": "C. Choroby Parkinsona (egzamin neurologia 2026 cykl A-2.docx, pyt. 43)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Objawy parkinsonizmu polekowego są zwykle:\nA. Asymetryczne\nB. Symetryczne\nC. Zawsze jednostronne\nD. Z przewagą w kończynach dolnych\nE. Z przewagą w kończynach górnych", "a": "B. Symetryczne (egzamin neurologia 2026 cykl A-2.docx, pyt. 44)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Który z poniższych leków najczęściej wywoluje parkinsonizm polekowy?\nA. Diazepam\nB. Haloperidol\nC. Paracetamol\nD. Klozapına\nE. Betahistyna", "a": "B. Haloperidol (egzamin neurologia 2026 cykl A-2.docx, pyt. 45)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Które z poniższych schorzeń należy do taupatii?\nA. Choroba Wilsona\nB. Choroba Huntingtona\nC. Postępujące porażenie nadjądrowe\nD. Zespół Tourette\nE. Choroba Parkinsona", "a": "C. Postępujące porażenie nadjądrowe (egzamin neurologia 2026 cykl A-2.docx, pyt. 47)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Który z poniższych objawów, najbardziej przemawia za rozpoznaniem atypowego zespołu parkinsonowskiego, a nie choroby Parkinsona?\nA. Asymetria objawów\nB. Drżenie spoczynkowe\nC. Wczesne zaburzenia postawy i upadki\nD. Dobra odpowiedź na lewodopę\nE. Mikrografia", "a": "C. Wczesne zaburzenia postawy i upadki (egzamin neurologia 2026 cykl A-2.docx, pyt. 48)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Który z poniższych objawów jest typowy dla dystonii szyjnej\nA. Ruchy pląsawicze głowy\nB. Skręcenie i przymusowe ustawienie głowy\nC. Oczopląs i ataksja\nD. Drżenie spoczynkowe\nE. Bradykinezja", "a": "B. Skręcenie i przymusowe ustawienie głowy (egzamin neurologia 2026 cykl A-2.docx, pyt. 49)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Który z poniższych objawów NIE WYSTĘPUJE w chorobie Wilsona?\nA. Pierścień Kaysera-Fleischera\nB. Objawy psychiatryczne\nC. Spadek ceruloplazminy i zwiększenie miedzi w moczu\nD. Objawy pozapiramidowe\nE. Wzrost stężenia ceruloplazminy", "a": "E. Wzrost stężenia ceruloplazminy (egzamin neurologia 2026 cykl A-2.docx, pyt. 50)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Choroba Parkinsona z otępieniem (PDD) vs otępienie z ciałami Lewy'ego (DL.B) - wskaż prawidlowe stwierdzenie:\nA. w DLB otępienie pojawia się dopiero po ≥ 10 latach trwania parkinsonizmu\nB. PDD rozpoznaje się, gdy otępienie poprzedza objawy ruchowe\nC. PDD rozpoznaje się, gdy otępienie rozwija się ≥ 1 roku po wystąpieniu objawów parkinsonowskich (,,reguła roku\")\nD. „reguła roku\" dotyczy wyłącznie otepienia naczyniopochodnego\nE. w PDD nie występują omamy wzrokowe", "a": "C. PDD rozpoznaje się, gdy otępienie rozwija się ≥ 1 roku po wystąpieniu objawów parkinsonowskich (,,reguła roku\") (egzamin neurologia 2026 cykl A-2.docx, pyt. 54)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "W leczeniu dystonii ogniskowych leczeniem z wyboru są:\nA. Benzodiazepiny\nB. Leki cholinolityczne\nC. Wstrzyknięcia toksyny botulinowej\nD. Leki przeciwdrgawkowe\nE. Lewodope", "a": "C. Wstrzyknięcia toksyny botulinowej (egzamin neurologia 2026 cykl A-2.docx, pyt. 62)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Nasilona dysautonomia występująca na początkowym etapie choroby jest charakterystyczna dla:\nA. choroby parkinsona\nB. postępującego porażenia nadjądrowego\nC. zaniku wieloukładowego\nD. parkinsonizmu naczyniowego\nE. otępienia z ciałami Lewy’ego", "a": "C. zaniku wieloukładowego (egzamin neurologia II 2026 cykl A-3.docx, pyt. 35)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Pacjent 65-letni od 15 lat chorujący na chorobę Parkinsona. Leczony aktualnie lewodopą w dawce 2000mg/dobę, ropinirolem 16mg/dobę oraz amantadyną 300mg/dobę. Jak wynika z dzienniczka Hausera przez 50% czasu aktywności występują stany OFF, a przez 30% stany ON z dokuczliwymi dyskinezami. Z objawów pozaruchowych występują: hipotonia ortostatyczna oraz łagodne otępienie. Zaproponuj dalsze postępowanie:\nA. należy zwiększyć zarówno dawkę lewodopy jak i ropinirolu\nB. należy odstawić amantadynę\nC. choremu należy zaproponować zaawansowane metody terapii - w tym przypadku w pierwszej kolejności podskórny wlew apomorfiny\nD. choremu należy zaproponować zaawansowane metody terapii - w tym przypadku w pierwszej kolejności DBS-STN\nE. choremu należy zaproponować zaawansowane metody terapii - w tym przypadku w pierwszej kolejności podskórny foslewodopa+foskarbodopa", "a": "E. choremu należy zaproponować zaawansowane metody terapii - w tym przypadku w pierwszej kolejności podskórny foslewodopa+foskarbodopa (egzamin neurologia II 2026 cykl A-3.docx, pyt. 37)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Układ pozapiramidowy i zaburzenia ruchowe: co trzeba pamiętać o: Choroba Parkinsona?", "a": "Choroba Parkinsona: bradykinezja plus drżenie spoczynkowe, sztywność lub zaburzenia postawy; często asymetryczny początek."}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Układ pozapiramidowy i zaburzenia ruchowe: co trzeba pamiętać o: Objawy niemotoryczne PD?", "a": "Objawy niemotoryczne PD: hiposmia, zaparcia, depresja, zaburzenia snu REM, dysautonomia i zaburzenia poznawcze."}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Układ pozapiramidowy i zaburzenia ruchowe: co trzeba pamiętać o: Atypowy parkinsonizm?", "a": "Atypowy parkinsonizm: szybka progresja, wczesne upadki, słaba odpowiedź na lewodopę, objawy autonomiczne, spojrzenie pionowe albo wyraźna asymetria korowa."}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Układ pozapiramidowy i zaburzenia ruchowe: co trzeba pamiętać o: ten punkt?", "a": "DLB: otępienie plus parkinsonizm, fluktuacje poznawcze, omamy wzrokowe i nadwrażliwość na neuroleptyki."}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Układ pozapiramidowy i zaburzenia ruchowe: co trzeba pamiętać o: ten punkt?", "a": "MSA: parkinsonizm lub ataksja z nasilonymi objawami autonomicznymi. PSP: wczesne upadki i porażenie spojrzenia pionowego. CBD: asymetryczny zespół korowy i apraksja."}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Układ pozapiramidowy i zaburzenia ruchowe: co trzeba pamiętać o: ten punkt?", "a": "PD: 'wolno, sztywno, drży'. ET: 'drży przy działaniu'. Huntington: 'tańczy, zmienia psychikę, dziedziczy AD'."}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Układ pozapiramidowy i zaburzenia ruchowe: co trzeba pamiętać o: ten punkt?", "a": "PSP zapamiętaj przez oczy i upadki; MSA przez autonomię; CBD przez asymetrię i objawy korowe."}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Układ pozapiramidowy i zaburzenia ruchowe: co trzeba pamiętać o: ten punkt?", "a": "Dystonia to utrwalone lub napadowe skręcające skurcze, często zależne od zadania lub pozycji."}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Układ pozapiramidowy i zaburzenia ruchowe: co pamiętasz o: w badaniu neuropatologicznym?", "a": "rozlane zmiany zapalno-demielinizacyjne w istocie białej, nieraz z ogniskami"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Układ pozapiramidowy i zaburzenia ruchowe: co pamiętasz o: MR?", "a": "rozległe, hiperintensywne strefy w istocie białej, widoczne w T2; mogą mieć charakter guzowaty (tumefactive MS)"}, {"chapter": "Układ pozapiramidowy i zaburzenia ruchowe", "q": "Układ pozapiramidowy i zaburzenia ruchowe: odtwórz fakt ze skryptu zaczynający się od: Drżenia - mimowolny, oscylacyjny ruch kończyn lub głowy, wywołany...", "a": "Drżenia - mimowolny, oscylacyjny ruch kończyn lub głowy, wywołany naprzemiennym skurczem mm."}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Zaznacz NIEPRAWIDŁOWE stwierdzenie dotyczące rozłanego aksonalnego uszkodzenia mózgu:\nA. Nieprawidłowości są zawsze widoczne w badaniu TK mózgu\nB. Śpiączka utrzymuje się powyżej 6 godzin\nC. U chorych mogą wystąpić zaburzenia czynności autonomicznych\nD. Powstaje w wyniku urazu w mechanizmie akceleracyjno-rotacyjnym\nE. Po ustąpieniu śpiączki często są obecne zaburzenia funkcji poznawczych", "a": "A. Nieprawidłowości są zawsze widoczne w badaniu TK mózgu (egzamin neurologia 2026 cykl A-2.docx, pyt. 13)"}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Warunkiem rozpoznania otępienia jest:\nA. sam wynik MMSE < 24\nB. utrzymywanie się zaburzeń poznawczych ≥ 1 miesiąc i brak omamów\nC. utrzymywanie się zaburzeń poznawczych ≥ 6 miesięcy oraz wykluczenie zaburzeń świadomości (w tym majaczenia) i depresji\nD. obecnosé urojeń przez ≥ 2 tygodnie\nE. wyłącznie subiektywna skargi na zaburzenia pamięci", "a": "C. utrzymywanie się zaburzeń poznawczych ≥ 6 miesięcy oraz wykluczenie zaburzeń świadomości (w tym majaczenia) i depresji (egzamin neurologia 2026 cykl A-2.docx, pyt. 29)"}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Które zdanie o epidemiologii otępienia jest prawdziwe?\nA. ryzyko otępienia maleje po 85. r.z.\nB. ryzyko zachorowania podwaja się co 5 lat; a po 85. r.z. przekracza 40%\nC. na świecie choruje ok. 5 mln osób\nD. w Polsce choruje ok. 50 tys. osób\nE. w wieku 65-70 lat częstość wynosi ~10%", "a": "B. ryzyko zachorowania podwaja się co 5 lat; a po 85. r.z. przekracza 40% (egzamin neurologia 2026 cykl A-2.docx, pyt. 30)"}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Który opis najlepiej oddaje cechy radiologiczne choroby Alzheimera w badaniach obrazowych?\nA. zanik przyśrodkowych części płatów skroniowych (hipokampa)\nB. badania SPECT i PET są bezużyteczne diagnostycznie\nC. PiB-PET służy głównie do uwidaczniania złogów białka tau\nD. w chorobie Alzheimera nigdy nie stwierdza się odchyleń w badaniach obrazowych\nE. w spektroskopii MR zawsze obserwuje się wzrost N-acetyloasparaginianu (NAA)", "a": "A. zanik przyśrodkowych części płatów skroniowych (hipokampa) (egzamin neurologia 2026 cykl A-2.docx, pyt. 51)"}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Co przemawia PRZECIW rozpoznaniu otępienia naczyniopochodnego?\nA. wczesne zaburzenia chodu, chód małymi krokami/na szerokiej podstawie\nB. zaburzenia dyzuryczne bez przyczyny urologicznej\nC. skokowe pogarszanie się i fluktuacje funkcji poznawczych\nD. liczne zawały lakunarne i leukoarajoza w MR\nE. wczesny, izolowany, stopniowy deficyt pamięci przy braku ogniskowego deficytu i braku zmian naczyniopochodnych w TK/MR na pewno?", "a": "E. wczesny, izolowany, stopniowy deficyt pamięci przy braku ogniskowego deficytu i braku zmian naczyniopochodnych w TK/MR na pewno? (egzamin neurologia 2026 cykl A-2.docx, pyt. 55)"}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Które stwierdzenie dotyczące łagodnych zaburzeń poznawczych (MCI, ang. mild cognitive impairment) jest prawdziwe?\nA. pacjent pozostaje samodzielny w zakresie aktywności dnia codziennego, ale istnieje obiektywne pogorszenie funkcji poznawczych, bez otępienia\nB. do rozpoznania MCI konieczne jest majaczenie\nC. rozpoznanie MCI wymaga upośledzenia w zakresie codziennych aktywności\nD. MCI to synonim otępienia\nE. w MCI zaburzenia nigdy nie dotyczą pamięci", "a": "A. pacjent pozostaje samodzielny w zakresie aktywności dnia codziennego, ale istnieje obiektywne pogorszenie funkcji poznawczych, bez otępienia (egzamin neurologia II 2026 cykl A-3.docx, pyt. 7)"}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Najbardziej charakterystyczne zmiany neuropatologiczne w chorobie Alzheimera to:\nA. demielinizacja z “płowieniem” mieliny” (shadow plaques)\nB. złogi białek prionowych\nC. izolowany zanik móżdżku\nD. blaszki starcze z amyloidem B i wewnątrzkomórkowe sploty neurofibrylarne z hiperfosforylowanym białkiem tau\nE. wyłącznie odkładanie alfa-synukleiny w istocie czarnej", "a": "D. blaszki starcze z amyloidem B i wewnątrzkomórkowe sploty neurofibrylarne z hiperfosforylowanym białkiem tau (egzamin neurologia II 2026 cykl A-3.docx, pyt. 8)"}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Objaw Gowersa obserwuje się u pacjentów:\nA. zespołu kanału nadgarstka\nB. dystrofia mięśniowa\nC. uszkodzeniem splotu ramiennego\nD. wiądem rdzenia\nE. chorobą alzheimera", "a": "B. dystrofia mięśniowa (egzamin neurologia II 2026 cykl A-3.docx, pyt. 22)"}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Otępienia neurozwyrodnieniowe i naczyniowe: co trzeba pamiętać o: Choroba Alzheimera?", "a": "Choroba Alzheimera: początek zwykle od pamięci epizodycznej, potem język, funkcje wzrokowo-przestrzenne i wykonawcze."}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Otępienia neurozwyrodnieniowe i naczyniowe: co trzeba pamiętać o: ten punkt?", "a": "FTD: wczesne zmiany zachowania, odhamowanie, apatia, utrata empatii, stereotypie lub warianty językowe; pamięć może być względnie lepsza na początku."}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Otępienia neurozwyrodnieniowe i naczyniowe: co trzeba pamiętać o: ten punkt?", "a": "DLB: fluktuacje poznawcze, omamy wzrokowe, parkinsonizm i zaburzenia snu REM; uwaga na nadwrażliwość na neuroleptyki."}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Otępienia neurozwyrodnieniowe i naczyniowe: co trzeba pamiętać o: ten punkt?", "a": "PDD: otępienie rozwija się u chorego z rozpoznaną chorobą Parkinsona, zwykle po okresie objawów ruchowych."}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Otępienia neurozwyrodnieniowe i naczyniowe: co trzeba pamiętać o: Otępienie naczyniopochodne?", "a": "Otępienie naczyniopochodne: związek z udarami lub chorobą małych naczyń, schodkowy lub fluktuujący przebieg, objawy ogniskowe i spowolnienie wykonawcze."}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Otępienia neurozwyrodnieniowe i naczyniowe: co trzeba pamiętać o: ten punkt?", "a": "AD = pamięć; FTD = osobowość/język; DLB = fluktuacje i omamy; naczyniowe = schodki i ogniska."}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Otępienia neurozwyrodnieniowe i naczyniowe: co trzeba pamiętać o: Wodogłowie normotensyjne?", "a": "Wodogłowie normotensyjne: chód, otępienie, nietrzymanie moczu."}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Otępienia neurozwyrodnieniowe i naczyniowe: co trzeba pamiętać o: ten punkt?", "a": "Majaczenie jest ostre i fluktuuje z zaburzeniem uwagi; otępienie jest przewlekłe."}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Otępienia neurozwyrodnieniowe i naczyniowe: odtwórz fakt ze skryptu zaczynający się od: W wieku dorosłym nasilenie objawów się...", "a": "W wieku dorosłym nasilenie objawów się zmniejsza"}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Otępienia neurozwyrodnieniowe i naczyniowe: odtwórz fakt ze skryptu zaczynający się od: Leczenie - hamowanie nadmiernej aktywności układu dopaminergicznego -...", "a": "Leczenie - hamowanie nadmiernej aktywności układu dopaminergicznego - haloperidol, tiapryd, risperidon, arypiprazol, pimozyd; klonidyna (lżejsze przypadki), tetrabenazyna"}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Otępienia neurozwyrodnieniowe i naczyniowe: odtwórz fakt ze skryptu zaczynający się od: Objawy zespołu natręctw reagują na leki hamujące zwrotny wychwyt...", "a": "Objawy zespołu natręctw reagują na leki hamujące zwrotny wychwyt serotoniny"}, {"chapter": "Otępienia neurozwyrodnieniowe i naczyniowe", "q": "Otępienia neurozwyrodnieniowe i naczyniowe: odtwórz fakt ze skryptu zaczynający się od: Napadowy kurcz mięśni unerwianych przez NC...", "a": "Napadowy kurcz mięśni unerwianych przez NC VII."}, {"chapter": "Bóle głowy i zawroty", "q": "20-letni mężczyzna skarży się na powtarzające się napady silnego bólu głowy obejmującego okolicę oczodołową, nadoczodołową oraz skroniową. Napady pojawiają się 1-2 razy w roku, trwają od 15 minut do 180 min, towarzyszą im zwykle przekrwienie spojówki, Izawienie, opadnięcie powieki zwężenie źrenicy oraz epizody zachowań agresywnych. Wskaż rodzaj bólu glowy występujący u pacjenta:\nA. Hemikrania napadowa\nB. Klasterowy ból głowy\nC. Migrena z aurą\nD. Migrena siatkówkowa\nE. Napięciowy ból głowy", "a": "B. Klasterowy ból głowy (egzamin neurologia 2026 cykl A-2.docx, pyt. 70)"}, {"chapter": "Bóle głowy i zawroty", "q": "Bóle głowy i zawroty: co trzeba pamiętać o: ten punkt?", "a": "Migrena: napadowy, zwykle jednostronny pulsujący ból, nudności, foto-/fonofobia, nasilenie przy aktywności; może być aura."}, {"chapter": "Bóle głowy i zawroty", "q": "Bóle głowy i zawroty: co trzeba pamiętać o: Napięciowy ból głowy?", "a": "Napięciowy ból głowy: obustronny, uciskowy, łagodny/umiarkowany, bez typowych nudności i bez nasilania wysiłkiem."}, {"chapter": "Bóle głowy i zawroty", "q": "Bóle głowy i zawroty: co trzeba pamiętać o: Klasterowy ból głowy?", "a": "Klasterowy ból głowy: bardzo silny jednostronny ból oczodołowo-skroniowy z objawami autonomicznymi, seriami napadów."}, {"chapter": "Bóle głowy i zawroty", "q": "Bóle głowy i zawroty: co trzeba pamiętać o: Czerwone flagi?", "a": "Czerwone flagi: nagły piorunujący początek, nowy ból po 50 r.ż., gorączka/oponowe, deficyt ogniskowy, nowotwór/immunosupresja, ciąża/połóg, ból po urazie."}, {"chapter": "Bóle głowy i zawroty", "q": "Bóle głowy i zawroty: co trzeba pamiętać o: Vertigo obwodowe?", "a": "Vertigo obwodowe: silne wirowanie, nudności, oczopląs zwykle jednokierunkowy, zaburzenia słuchu możliwe, bez innych objawów pniowych."}, {"chapter": "Bóle głowy i zawroty", "q": "Bóle głowy i zawroty: co trzeba pamiętać o: Migrena lubi ciemność; napięciowy ściska; klaster budzi i łzawi.?", "a": "Migrena lubi ciemność; napięciowy ściska; klaster budzi i łzawi."}, {"chapter": "Bóle głowy i zawroty", "q": "Bóle głowy i zawroty: co trzeba pamiętać o: W zawrotach centralnych szukaj móżdżku i pnia, nie samego błędnika.?", "a": "W zawrotach centralnych szukaj móżdżku i pnia, nie samego błędnika."}, {"chapter": "Bóle głowy i zawroty", "q": "Bóle głowy i zawroty: co trzeba pamiętać o: ten punkt?", "a": "Piorunujący ból głowy to SAH, dopóki nie udowodnisz inaczej w materiale egzaminacyjnym."}, {"chapter": "Bóle głowy i zawroty", "q": "Bóle głowy i zawroty: co pamiętasz o: wykluczające?", "a": "wczesny początek i stopniowy przebieg, brak ogniskowego deficytu poznawczego, brak zmian naczyniopochodnych w TK/MR"}, {"chapter": "Padaczka", "q": "O padaczce lekoopornej mówi się wówczas, gdy:\nA. 1 próba leczenia w monoterapii lub terapii dodanej nie prowadzi do osiągnięcia utrwalonej i pełnej kontroli napadów\nB. 2 kolejne próby leczenia w monoterapii lub terapii dodanej nie prowadzą do osiągnięcia utrwalonej i pełnej kontroli napadów\nC. 3 kolejne próby leczenia w monoterapii lub terapii dodanej nie prowadzą do osiągnięcia utrwalonej i pełnej kontroli napadów\nD. 4 kolejne próby leczenia w monoterapii lub terapii dodanej nie prowadzą do osiągnięcia utrwalonej i pełnej kontroli napadów\nE. 5 kolejnych prób leczenia w monoterapii lub terapii dodanej nie prowadzą do osiągnięcia utrwalonej i pełnej kontroli napadów", "a": "B. 2 kolejne próby leczenia w monoterapii lub terapii dodanej nie prowadzą do osiągnięcia utrwalonej i pełnej kontroli napadów (egzamin neurologia 2026 cykl A-2.docx, pyt. 11)"}, {"chapter": "Padaczka", "q": "Wskaż NIEPRAWIDŁOWE zdanie dotyczące procesu epileptogenezy:\nA. epileptogeneza obejmuje szereg zmian molekularnych prowadzących do trwałej skłonności do generowaniu napadów\nB. epileptogeneza zapoczątkowuje tzw. zdarzenie inicjujące, uszkadzające mózg np. uraz lub udar\nC. w okresie utajonym występują naprzemiennie okresy napadów i samoistnej remisji\nD. w okresie utajonym nie obserwuje się napadów padaczkowych\nE. W okresie przewlekłym pojawiają się spontaniczne, nawracające napady lęku padaczkowe\nF. w", "a": "C. w okresie utajonym występują naprzemiennie okresy napadów i samoistnej remisji (egzamin neurologia 2026 cykl A-2.docx, pyt. 39)"}, {"chapter": "Padaczka", "q": "Które z poniższych zdań charakteryzuje zespöl padaczkowy\nA. to każdy pojedynczy napad padaczkowy bez względu na jego przyczynę\nB. jest to stan, w ktörym wszystkie napady są wyłącznie uogólnione toniczno-kloniczne\nC. jest to grupa napadów objawowych, wywołana jedynie ostrym czynnikiem metabolicznym\nD. jest to zespół objawów obejmujący typowy wiek wystąpienia, morfologię napadów oraz wzorzec zapisu EEG, stanowiący określoną jednostkę w klasyfikacji padaczek\nE. jest to wyłącznie padaczka pourazowa o późnym początku", "a": "D. jest to zespół objawów obejmujący typowy wiek wystąpienia, morfologię napadów oraz wzorzec zapisu EEG, stanowiący określoną jednostkę w klasyfikacji padaczek (egzamin neurologia 2026 cykl A-2.docx, pyt. 40)"}, {"chapter": "Padaczka", "q": "W jakim celu wykonuje się badanie VEP?\nA. Oceny przewodnictwa w nerwach obwodowych\nB. Oceny funkcji nerwu wzrokowego i drogi wzrokowej\nC. Monitorowania aktywności napadowej\nD. Diagnostyki chorób nerwowo-mięśniowych\nE. Oceny czynności pnia mózgu", "a": "B. Oceny funkcji nerwu wzrokowego i drogi wzrokowej (egzamin neurologia 2026 cykl A-2.docx, pyt. 42)"}, {"chapter": "Padaczka", "q": "Leczenie otępienia czołowo-skroniowego (FTD, ang. frontotemporal dementia) - wskaż które stwierdzenie jest prawdziwe?\nA. donepezil jest lekiem z wyboru i zwykle poprawia zachowanie\nB. lewodopa poprawia zaburzenia zachowania\nC. glikokortykosteroidy i plazmafereza to standard\nD. inhibitory acetylocholinesterazy są nieskuteczne i mogą nasilać zaburzenia zachowania, można rozważyć SSRI oraz neuroleptyki atypowe/kwas walproinowy/karbamazepine\nE. skuteczna jest szczepionka przeciw amyloidowi ß", "a": "D. inhibitory acetylocholinesterazy są nieskuteczne i mogą nasilać zaburzenia zachowania, można rozważyć SSRI oraz neuroleptyki atypowe/kwas walproinowy/karbamazepine (egzamin neurologia 2026 cykl A-2.docx, pyt. 53)"}, {"chapter": "Padaczka", "q": "U 25-letniej pacjentki z padaczką od 8 roku życia i planującej ciążę w najbliższych miesiącach można zastosować:\nA. Topiramat\nB. Lamotryginę\nC. Gabapentynę\nD. Karbamazepine\nE. Cenobamat", "a": "B. Lamotryginę (egzamin neurologia 2026 cykl A-2.docx, pyt. 56)"}, {"chapter": "Padaczka", "q": "Lekami stosowanymi w drugim etapie leczenia stanu padaczkowego są:\nA. Kwas walproinowy i cenobamat\nB. Karbamazepina i fenytoina\nC. Kwas walproinowy, levetiracetam i fenytoina\nD. Levetiracetam i lamotrygina\nE. Karbamazepina i cenobamat", "a": "C. Kwas walproinowy, levetiracetam i fenytoina (egzamin neurologia 2026 cykl A-2.docx, pyt. 58)"}, {"chapter": "Padaczka", "q": "Niedowład/porażenie Todda charakteryzują wszystkie ponižsze stwierdzenia ZA WYJATKIEM:\nA. Wystąpienie niedowładu/porażenia następuje po napadzie padaczkowym\nB. Wystąpienie niedowładu/porażenia poprzedza napad drgawkowy\nC. Objawy ustępują najczęściej w ciągu 48 godzin\nD. Może imitować objawy udaru mózgu\nE. Zwykle związany jest ze strukturalnym uszkodzeniem mózgu", "a": "B. Wystąpienie niedowładu/porażenia poprzedza napad drgawkowy (egzamin neurologia 2026 cykl A-2.docx, pyt. 59)"}, {"chapter": "Padaczka", "q": "Termin SUDEP oznacza:\nA. Zespół nagłej nieoczekiwanej śmierci pacjentów z padaczką\nB. Ciężki zespół padaczkowy rozpoczynający się w okresie niemowlęcym\nC. Napad padaczkowy powikłany niewydolnością oddechową\nD. Napady padaczkowe powikłane licznymi urazami mózgu\nE. Naglą śmierć pacjenta z padaczką w następstwie przedawkowania leków", "a": "A. Zespół nagłej nieoczekiwanej śmierci pacjentów z padaczką (egzamin neurologia 2026 cykl A-2.docx, pyt. 60)"}, {"chapter": "Padaczka", "q": "Nieznaną etiologię ma około:\nA. 10% padaczek\nB. 20-30% padaczek\nC. 50-60% padaczek\nD. 5% padaczek\nE. ponad 80% padaczek", "a": "C. 50-60% padaczek (egzamin neurologia II 2026 cykl A-3.docx, pyt. 10)"}, {"chapter": "Padaczka", "q": "Napady padaczkowe węchowe (hakowe) najczęściej pojawiają się w wyniku uszkodzenia:\nA. podstawy płata czołowego\nB. bocznej części płata skroniowego\nC. przyśrodkowej części płata skroniowego\nD. płata potylicznego\nE. płata ciemieniowego", "a": "C. przyśrodkowej części płata skroniowego (egzamin neurologia II 2026 cykl A-3.docx, pyt. 11)"}, {"chapter": "Padaczka", "q": "Do leków p/padaczkowych, których poziom można oznaczyć w surowicy krwi zalicza się:\nA. fenytoinę\nB. karbamazepinę\nC. lamotryginę\nD. kwas walproinowy\nE. wszystkie odpowiedzi są prawidłowe", "a": "E. wszystkie odpowiedzi są prawidłowe (egzamin neurologia II 2026 cykl A-3.docx, pyt. 12)"}, {"chapter": "Padaczka", "q": "Do definicji stanu padaczkowego odnosi się stwierdzenie:\nA. napad padaczkowy przedłużający się powyżej 2-3 minuty\nB. napad padaczkowy przedłużający się powyżej 5 minut\nC. kilka napadów padaczkowych powtarzających się w ciągu 1 doby\nD. powtarzające się 2 lub więcej napady padaczkowe, pomiędzy którymi chory nie odzyskuje świadomości\nE. prawidłowe odpowiedzi b i d", "a": "E. prawidłowe odpowiedzi b i d (egzamin neurologia II 2026 cykl A-3.docx, pyt. 13)"}, {"chapter": "Padaczka", "q": "Zawroty głowy, ataksja, oczopląs, hyponatremia, wysypka skórna - mogą sugerować przedawkowanie:\nA. karbamazepiny\nB. kwasu walproinowego\nC. gabapentyny\nD. clonazepamu\nE. topiramatu", "a": "A. karbamazepiny (egzamin neurologia II 2026 cykl A-3.docx, pyt. 14)"}, {"chapter": "Padaczka", "q": "Nieprawidłowe stwierdzenie dotyczące napadów padaczkowych z odstawienia alkoholu to:\nA. zwykle występują kilka-kilkanaście godzin po odstawieniu alkoholu\nB. najczęściej są to napady ogniskowe\nC. u 3% chorych mogą wystąpić stany padaczkowe\nD. w leczeniu podaje się tiaminę dożylnie\nE. u 30% rozwija się delirium", "a": "B. najczęściej są to napady ogniskowe (egzamin neurologia II 2026 cykl A-3.docx, pyt. 15)"}, {"chapter": "Padaczka", "q": "Typowym objawem udaru w zakresie tętnicy tylnej mózgu (PCA) jest:\nA. afazja ruchowa\nB. hemianopsja jednoimienna\nC. apraksja kończyn\nD. zespół opuszkowy\nE. ataksja tułowia\nF. 42 . W przypadku udaru niedokrwiennego w zakresie pnia mózgu mogą wystąpić:\nG. izolowana afazja\nH. oczopląs i porażenie spojrzenia bocznego\nI. jednostronna ślepota\nJ. apraksja kończyn\nK. zespół zaniedbywania przestrzennego\nL. Wskaż prawdziwe zdanie dotyczące znaczenia prążków oligoklonalnych (OCB) w płynie mózgowo-rdzeniowym w stwardnieniu rozsianym (SM):\nM. są obecnie u >90% chorych, odzwierciedlają wewnątrzmózgową syntezę immunoglobulin i nie są swoiste dla SM\nN. występują wyłącznie w SM i znikają po leczeniu immunomodulacyjnym\nO. ich brak wyklucza rozpoznanie SM\nP. obecne są tylko w czasie rzutu i ściśle korelują z nasileniem objawów\nQ. powstają wyłącznie przeciw wirusom odry i różyczki\nR. Do kryteriów “rozsiania w czasie” wg kryteriów diagnostycznych stwardnienia rozsianego (McDonalda z 2017 r.) należą:\nS. wystąpienie kolejnego rzutu choroby\nT. obecność oligoklonalnych prążków Ig w płynie mózgowo-rdzeniowym\nU. obecność nowej zmiany demielinizacyjnej w badaniu rezonansowym\nV. obecność zarówno zmian nieaktywnych oraz aktywnych (wzmacniających się po podaniu kontrastu) w badaniu rezonansowym\nW. wszystkie powyższe\nX. Które zdanie o epidemiologii otępienia jest prawdziwe:\nY. ryzyko otępienia maleje po 85 r.ż.\nZ. ryzyko zachorowania podwaja się co 5 lat; po 85 r.ż. przekracza 40%\n[. na świecie choruje około 5 mln osób\n\\. w Polsce choruje ok. 50 tys. osób\n]. w wieku 65-70 lat częstość wynosi ~10%\n^. Choroba Parkinsona z otępieniem (PDD) vs. otępienie z ciałami Lewy’ego (DLB) - prawidłowe jest:\n_. w DLB otępienie pojawia się dopiero po ≥ 10 latach parkinsonizmu\n`. PDD rozpoznaje się, gdy otępienie poprzedza objawy ruchowe\na. PDD rozpoznaje się, gdy otępienie rozwija się ≥ 1 rok po wystąpieniu objawów parkinsonowskich (“reguła roku”)\nb. “reguła roku” dotyczy wyłącznie otępienia naczyniopochodnego\nc. w PDD nie występują omamy wzrokowe\nd. Niedowład/Porażenie Todda charakteryzują wszystkie poniższe stwierdzenia za wyjątkiem:\ne. wystąpienie niedowładu/porażenia następuje po napadzie padaczkowym\nf. występowanie niedowładu/porażenia poprzedza napad drgawkowy\ng. objawy ustępują najpóźniej do 48h\nh. może imitować objawy udaru mózgu\ni. zwykle związany jest ze strukturalnym uszkodzeniem mózgu\nj. Które z podanych niżej stwierdzeń nie odnosi się do krwiaka nadtwardówkowego:\nk. krwawienie do przestrzeni między oponą twardą a czaszką\nl. stanowi około 30% wszystkich urazów czaszkowo-mózgowych\nm. najczęściej spowodowany urazem tętnicy oponowej środkowej\nn. w obrazie klinicznym może wystąpić tzw. “lucidum intervallum”\no. najczęściej ma ostry przebieg\np. Z zanikami mięśniowymi drobnych mięśni rąk spotykamy się w poniższych jednostkach chorobowych za wyjątkiem:\nq. stwardnienia zanikowego bocznego\nr. zespołu żebra szyjnego\ns. neuropatii ruchowej z blokiem przewodzenia\nt. uszkodzenia górnej części splotu ramiennego (Erba)\nu. Dystrofii Welander\nv. W zespole Lamberta-Eatona nie spodziewamy się wyraźnej poprawy po leczeniu:\nw. sterydami\nx. inhibitorami esterazy cholinowej\ny. lekami immunosupresyjnymi\nz. plazmafereza\n{. immunoglobulinami\n|. jakieś leki -> wszystkie xd\n}. Prawidłowe o SM -> efekt migracji przed 15 rz\n~. dziod z udarem -> 1,2 a nie wszystkie? Tam w 7 było porażenie Todda i jeszcze w 3 hipoglikemia jak rozkminialem z czatem mówił ze todd po padaczce by był a tam nie było chyba\n. ośrodkowy n VII -> przeciwstronnie z czołem (smak nie bo ośrodkowy)\n. MR w niedokrwiennym -> hipodensyjny w ADC chyba tam chyba powinno być ze hiperintensywny w dwi i obniżony w adc\n. lek w padaczce z ataksja itp ->karbamazepina\n. alzheimer -> beta amyloid białko tau\n. PICA -> zespół wallenberga\n. udar lakunarny-> lipohialinoza\n. zaburzenia wechu hakowe -> przyśrodkowe skroniowe uszkodzenie\n. ropień -> neuroobrazowanie\n. menigititis -> białko podwyższone glukoza obniżona neutrofile podwyższone\n. zespół padaczkowy -> b i d\n. największe ryzyko afazji -> środkowa\n. więcej nie pamietam + 10 z bazy I termin\n. Pytanie z wybraniem NOTCH1 dla CADASIL\n. Objaw goversa gdzie występuje - dystrofia mięśniowa\n. Z padaczką metaboliczna - na logike jakas fajna odp była\n. emg ze coraz słabsze -> chyba tez lambert\n. lambert eaton co nie pasuje\n. współistnieje z rakiem\n. najczęściej mężczyźni\n. brak objawu kolanowego\n. coś emg <-chyba to chat mówi tak\n. nuzliwosc kończyn dolnych\n. najbardziej charakterystyczny w neuroboreliozie czy coś takiego -> nerw twarzowy??\n. autonomiczne -> zanik wieloukladowy\n. Nieprawidłowe dotyczące napadów padaczkowych z odstawienia alkoholu\n. występują kilka-kilkanaście godzin po odstawieniu\n. najczęściej są to napady ogniskowe\n. u 3% przechodzą w stany padaczkowe\n. w leczeniu podaje się tiamine dożylnie\n. u 30% rozwija się delirium\n. stężenie których leków można oznaczyć we krwi\n. karbamazepina\n. kwas walprinowy\n . wszystkie", "a": "B. hemianopsja jednoimienna (egzamin neurologia II 2026 cykl A-3.docx, pyt. 41)"}, {"chapter": "Padaczka", "q": "Padaczka: co trzeba pamiętać o: ten punkt?", "a": "Napad padaczkowy to przemijające objawy wynikające z nadmiernej, synchronicznej czynności neuronów."}, {"chapter": "Padaczka", "q": "Padaczka: co trzeba pamiętać o: ten punkt?", "a": "Padaczka to skłonność do nawracających nieprowokowanych napadów; pojedynczy napad prowokowany nie musi oznaczać padaczki."}, {"chapter": "Padaczka", "q": "Padaczka: co trzeba pamiętać o: ten punkt?", "a": "Napady ogniskowe mogą przebiegać bez zaburzeń świadomości lub z zaburzeniami świadomości i mogą wtórnie uogólniać się."}, {"chapter": "Padaczka", "q": "Padaczka: co trzeba pamiętać o: Napady uogólnione?", "a": "Napady uogólnione: nieświadomości, miokloniczne, toniczne, kloniczne, toniczno-kloniczne, atoniczne."}, {"chapter": "Padaczka", "q": "Padaczka: co trzeba pamiętać o: Diagnostyka?", "a": "Diagnostyka: dokładny opis napadu/świadek, EEG, neuroobrazowanie przy podejrzeniu przyczyny strukturalnej, badania metaboliczne i różnicowanie omdleń."}, {"chapter": "Padaczka", "q": "Padaczka: co trzeba pamiętać o: Ogniskowy zaczyna się w jednej sieci, uogólniony od razu obejmuje obie półkule.?", "a": "Ogniskowy zaczyna się w jednej sieci, uogólniony od razu obejmuje obie półkule."}, {"chapter": "Padaczka", "q": "Padaczka: co trzeba pamiętać o: ten punkt?", "a": "Absence: krótkie wyłączenia, często prowokowane hiperwentylacją, bez splątania ponapadowego."}, {"chapter": "Padaczka", "q": "Padaczka: co trzeba pamiętać o: Po napadzie toniczno-klonicznym oczekuj fazy ponapadowej?", "a": "Po napadzie toniczno-klonicznym oczekuj fazy ponapadowej: senność, splątanie, bóle mięśni, przygryzienie języka."}, {"chapter": "Padaczka", "q": "Padaczka: odtwórz fakt ze skryptu zaczynający się od: Napad padaczkowy to epizod przemijających, obiektywnych i/lub...", "a": "Napad padaczkowy to epizod przemijających, obiektywnych i/lub subiektywnych objawów klinicznych spowodowanych nieprawidłową, nadmierną aktywnością kom. nerwowych mózgu."}, {"chapter": "Padaczka", "q": "Padaczka: co pamiętasz o: przyczyny zgonów?", "a": "stan padaczkowy, urazy, SUDEP (sudden unexpected death in epilepsy)"}, {"chapter": "Padaczka", "q": "Padaczka: odtwórz fakt ze skryptu zaczynający się od: Padaczka objawowa a. uwarunkowana genetycznie i. 20% padaczek (większe...", "a": "Padaczka objawowa a. uwarunkowana genetycznie i. 20% padaczek (większe ryzyko gdy chorowała matka niż gdy chorował ojciec)"}, {"chapter": "Padaczka", "q": "Padaczka: odtwórz fakt ze skryptu zaczynający się od: Do napadu padaczkowego dochodzi w wyniku zaburzenia równowagi między...", "a": "Do napadu padaczkowego dochodzi w wyniku zaburzenia równowagi między procesami hamowania (GABA- ergicznymi), a procesami pobudzania (glutaminergicznymi)."}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Do ogniskowych urazów mózgu NIE NALEŻY\nA. Krwiak nadtwardówkowy\nB. Uraz penetrujący\nC. Wstrząśnienie mózgu\nD. Stłuczenie mózgu\nE. Krwiak śródmózgowy", "a": "C. Wstrząśnienie mózgu (egzamin neurologia 2026 cykl A-2.docx, pyt. 12)"}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Które z podanych niżej stwierdzeń NIE ODNOSI SIĘ do krwiaka nadtwardówkowego:\nA. Krwawienie do przestrzeni między oponą twardą a czaszką\nB. Stanowi około 30% wszystkich urazów czaszkowo-mózgowych\nC. Najczęściej spowodowany urazem tętnicy oponowej środkowej\nD. obrazie klinicznym może wystąpić tzw. „lucidum intervallum\"\nE. Najczęściej ma ostry przebieg", "a": "B. Stanowi około 30% wszystkich urazów czaszkowo-mózgowych (egzamin neurologia 2026 cykl A-2.docx, pyt. 14)"}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Objaw Cushinga w przebiegu urazów czaszkowo-mózgowych charakteryzuje:\nA. Wzrost RR, bradykardia\nB. Wzrost RR, tachykardia\nC. Spadek RR, bradykardia\nD. Spadek RR, tachykardia\nE. Objaw ten nie jest związany z ciśnieniem tętniczym ani akcją serca", "a": "A. Wzrost RR, bradykardia (egzamin neurologia 2026 cykl A-2.docx, pyt. 15)"}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Przy jakim wyniku Glasgow Coma Scale (GCS) istnieją wskazania do intubacji chorego?\nA. 12 pkt\nB. 11 pkt.\nC. 10 pkt.\nD. 9 pkt.\nE. <8 pkt.", "a": "E. <8 pkt. (egzamin neurologia 2026 cykl A-2.docx, pyt. 16)"}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Leki, których NIE STOSUJE SIĘ w celu obniżenia ciśnienia śródczaszkowego w urazach to:\nA. 20% mannitolu\nB. Furosemid\nC. Hipertoniczny roztwór NaCl\nD. Sterydy\nE. Torasemid", "a": "D. Sterydy (egzamin neurologia 2026 cykl A-2.docx, pyt. 17)"}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Która z wymienionych odpowiedzi najlepiej odpowiada padaczce o etiologii metabolicznej?\nA. padaczka rozwijająca się po udarze niedokrwiennym\nB. padaczka związana z urazem czaszkowo-mózgowym\nC. padaczka w przebiegu autoimmunologicznego zapalenia mózgu\nD. padaczka w stwardnieniu guzowatym\nE. padaczka w przebiegu mocznicy lub porfirii", "a": "E. padaczka w przebiegu mocznicy lub porfirii (egzamin neurologia II 2026 cykl A-3.docx, pyt. 38)"}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Guzy OUN i urazy czaszkowo-mózgowe: co trzeba pamiętać o: Guzy śródczaszkowe?", "a": "Guzy śródczaszkowe: objawy ogólne z ciasnoty, napady padaczkowe, deficyty ogniskowe i zmiany psychiczne zależne od lokalizacji."}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Guzy OUN i urazy czaszkowo-mózgowe: co trzeba pamiętać o: Ciasnota śródczaszkowa?", "a": "Ciasnota śródczaszkowa: ból głowy, wymioty, tarcza zastoinowa, senność, porażenie VI i ryzyko wgłobienia."}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Guzy OUN i urazy czaszkowo-mózgowe: co trzeba pamiętać o: Guzy rdzenia/kanału kręgowego?", "a": "Guzy rdzenia/kanału kręgowego: ból korzeniowy, narastający niedowład, zaburzenia czucia z poziomem i zaburzenia zwieraczy."}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Guzy OUN i urazy czaszkowo-mózgowe: co trzeba pamiętać o: ten punkt?", "a": "Przerzuty do OUN są częstsze niż pierwotne guzy u dorosłych; myśl o płucu, piersi, czerniaku, nerce i przewodzie pokarmowym."}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Guzy OUN i urazy czaszkowo-mózgowe: co trzeba pamiętać o: Krwiak nadtwardówkowy?", "a": "Krwiak nadtwardówkowy: często uraz tętnicy oponowej środkowej, możliwy 'jasny okres', szybkie narastanie."}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Guzy OUN i urazy czaszkowo-mózgowe: co trzeba pamiętać o: ten punkt?", "a": "Nadtwardówkowy = tętnica i jasny okres; podtwardówkowy = żyły i starszy pacjent; podpajęczynówkowy = piorunujący ból."}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Guzy OUN i urazy czaszkowo-mózgowe: co trzeba pamiętać o: ten punkt?", "a": "Guz powoli narasta, udar jest nagły, infekcja zwykle ma gorączkę/stan zapalny - tempo pomaga."}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Guzy OUN i urazy czaszkowo-mózgowe: co trzeba pamiętać o: ten punkt?", "a": "Objawy rdzeniowe plus ból nocny/nowotwór w wywiadzie traktuj jako kompresję do wykluczenia."}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Guzy OUN i urazy czaszkowo-mózgowe: odtwórz fakt ze skryptu zaczynający się od: Felbamat - lekooporne napady w z....", "a": "Felbamat - lekooporne napady w z. Lennoxa-Gastauta"}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Guzy OUN i urazy czaszkowo-mózgowe: odtwórz fakt ze skryptu zaczynający się od: Najczęstsza przyczyna - choroby naczyniowe mózgu, procesy...", "a": "Najczęstsza przyczyna - choroby naczyniowe mózgu, procesy zwyrodnieniowe z otępieniem i guzy mózgu"}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Guzy OUN i urazy czaszkowo-mózgowe: odtwórz fakt ze skryptu zaczynający się od: Napady częściowe złożone, z wtórym uogólnieniem lub bez...", "a": "Napady częściowe złożone, z wtórym uogólnieniem lub bez uogólnienia"}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Guzy OUN i urazy czaszkowo-mózgowe: odtwórz fakt ze skryptu zaczynający się od: Częstość napadów nie jest duża, ale pomroczny stan napadowy utrzymuje...", "a": "Częstość napadów nie jest duża, ale pomroczny stan napadowy utrzymuje się dość długo"}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Guzy OUN i urazy czaszkowo-mózgowe: odtwórz fakt ze skryptu zaczynający się od: Próbę odstawienia leku p/padaczkowego można podjąć po min. 2-letnim...", "a": "Próbę odstawienia leku p/padaczkowego można podjąć po min. 2-letnim okresie wolnym od napadów, biorąc pod uwagę zapis EEG."}, {"chapter": "Guzy OUN i urazy czaszkowo-mózgowe", "q": "Guzy OUN i urazy czaszkowo-mózgowe: odtwórz fakt ze skryptu zaczynający się od: Padaczka lekooporna - 2 kolejne, odpowiednio dobrane i stosowane...", "a": "Padaczka lekooporna - 2 kolejne, odpowiednio dobrane i stosowane schematy leczenia nie zapewniają kontroli napadów (min. okres remisji to 12 msc. lub 3-krotność odstępu między napadami w okresie przed leczeniem)."}, {"chapter": "Toksyczne uszkodzenia OUN i zaburzenia snu", "q": "Objawy uszkodzenia komórek rogów przednich w rdzeniu wyraźne są we wszystkich poniższych jednostkach chorobowych ZA WYJĄTKIEM:\nA. Choroby Heine-Medina\nB. Rdzeniowego zaniku mięśni\nC. Stwardnienia zanikowego bocznego\nD. Jamistości rdzenia\nE. Zatrucia pestycydami fosfoorganicznymi", "a": "E. Zatrucia pestycydami fosfoorganicznymi (egzamin neurologia 2026 cykl A-2.docx, pyt. 76)"}, {"chapter": "Toksyczne uszkodzenia OUN i zaburzenia snu", "q": "Toksyczne uszkodzenia OUN i zaburzenia snu: co trzeba pamiętać o: ten punkt?", "a": "Zatrucia neurologiczne dają encefalopatię, drgawki, neuropatie, objawy pozapiramidowe, zaburzenia autonomiczne lub śpiączkę - zawsze pytaj o ekspozycję."}, {"chapter": "Toksyczne uszkodzenia OUN i zaburzenia snu", "q": "Toksyczne uszkodzenia OUN i zaburzenia snu: co trzeba pamiętać o: ten punkt?", "a": "Alkohol: ostre zatrucie, zespół abstynencyjny, majaczenie drżenne, encefalopatia Wernickego, zespół Korsakowa, polineuropatia i zwyrodnienie móżdżku."}, {"chapter": "Toksyczne uszkodzenia OUN i zaburzenia snu", "q": "Toksyczne uszkodzenia OUN i zaburzenia snu: co trzeba pamiętać o: Encefalopatia Wernickego?", "a": "Encefalopatia Wernickego: zaburzenia świadomości, ataksja, oftalmoplegia; kojarz z niedoborem tiaminy."}, {"chapter": "Toksyczne uszkodzenia OUN i zaburzenia snu", "q": "Toksyczne uszkodzenia OUN i zaburzenia snu: co trzeba pamiętać o: Leki i narkotyki?", "a": "Leki i narkotyki: obraz zależy od grupy, ale kluczowe są źrenice, oddech, temperatura, napięcie mięśniowe, drgawki i rytm serca."}, {"chapter": "Toksyczne uszkodzenia OUN i zaburzenia snu", "q": "Toksyczne uszkodzenia OUN i zaburzenia snu: co trzeba pamiętać o: Bezsenność?", "a": "Bezsenność: trudność zasypiania, utrzymania snu lub wczesne budzenie z pogorszeniem funkcjonowania."}, {"chapter": "Toksyczne uszkodzenia OUN i zaburzenia snu", "q": "Toksyczne uszkodzenia OUN i zaburzenia snu: co trzeba pamiętać o: Wernicke?", "a": "Wernicke: daj tiaminę w głowie przed glukozą w scenariuszach niedożywienia/alkoholu."}, {"chapter": "Toksyczne uszkodzenia OUN i zaburzenia snu", "q": "Toksyczne uszkodzenia OUN i zaburzenia snu: co trzeba pamiętać o: REM behavior disorder łączy się z PD, DLB i MSA.?", "a": "REM behavior disorder łączy się z PD, DLB i MSA."}, {"chapter": "Toksyczne uszkodzenia OUN i zaburzenia snu", "q": "Toksyczne uszkodzenia OUN i zaburzenia snu: co trzeba pamiętać o: Toksykologia neurologiczna to wzorzec?", "a": "Toksykologia neurologiczna to wzorzec: świadomość + źrenice + oddech + temperatura + ruchy."}, {"chapter": "Toksyczne uszkodzenia OUN i zaburzenia snu", "q": "Toksyczne uszkodzenia OUN i zaburzenia snu: odtwórz fakt ze skryptu zaczynający się od: Encefalopatia pourazowa trwałe uszkodzenie OUN deficyt ruchowo-czuciowy...", "a": "Encefalopatia pourazowa trwałe uszkodzenie OUN deficyt ruchowo-czuciowy padaczka, zaburzenia mowy i czynności poznawczych zmiany osobowości, obniżenie napędu"}, {"chapter": "Toksyczne uszkodzenia OUN i zaburzenia snu", "q": "Toksyczne uszkodzenia OUN i zaburzenia snu: odtwórz fakt ze skryptu zaczynający się od: Najczęściej są przewlekłe i manifestują się zespołem rzekomonerwicowym...", "a": "Najczęściej są przewlekłe i manifestują się zespołem rzekomonerwicowym (uszkodzenie ośrodkowe) i polineuropatią (uszkodzenie obwodowe)."}, {"chapter": "Toksyczne uszkodzenia OUN i zaburzenia snu", "q": "Toksyczne uszkodzenia OUN i zaburzenia snu: odtwórz fakt ze skryptu zaczynający się od: sam As nie jest trujący, ale jego tlenki tak huty miedzi, przemysł...", "a": "sam As nie jest trujący, ale jego tlenki tak huty miedzi, przemysł elektroniczny, górnictwo rud metali, elektrownie węglowe hamuje aktywności enzymów mitochondrialnych - zab. oddychania tkankowego"}, {"chapter": "Zaburzenia świadomości, śpiączka i śmierć mózgu", "q": "Które z poniższych objawów najczęściej występują w opryszczkowym zapaleniu mózgu HSV-1?\nA. niedowład połowiczy\nB. ataksja\nC. zaburzenia świadomości, drgawki\nD. diplopia i porażenie nerwu VI\nE. zespół Hornera", "a": "C. zaburzenia świadomości, drgawki (egzamin neurologia 2026 cykl A-2.docx, pyt. 10)"}, {"chapter": "Zaburzenia świadomości, śpiączka i śmierć mózgu", "q": "Do napadów ogniskowych NIE ZALICZAMY:\nA. napadów wzrokowych\nB. napadów wegetatywnych\nC. napadów czuciowych\nD. napadów nieświadomości\nE. napadów słuchowych", "a": "D. napadów nieświadomości (egzamin neurologia 2026 cykl A-2.docx, pyt. 38)"}, {"chapter": "Zaburzenia świadomości, śpiączka i śmierć mózgu", "q": "Które z poniższych objawów sugeruje krwotok móżdżkowy wymagający pilnej interwencji neurochirurgicznej?\nA. jednostronny oczopląs poziomy\nB. ataksja kończynowa bez zaburzeń świadomości\nC. szybko narastające zaburzenia świadomości i wymioty\nD. dysartria bez innych objawów\nE. izolowane zawroty głowy", "a": "C. szybko narastające zaburzenia świadomości i wymioty (egzamin neurologia II 2026 cykl A-3.docx, pyt. 17)"}, {"chapter": "Zaburzenia świadomości, śpiączka i śmierć mózgu", "q": "Wskaż zdanie prawidłowe dotyczące napadów ogniskowych:\nA. napad ogniskowy rozpoczyna się patologicznym wyładowaniem w tworze siatkowatym pnia mózgu\nB. w czasie napadu ogniskowego świadomość jest zawsze zaburzona\nC. przykładem napadu ogniskowego z płata czołowego jest napad ruchowy typu Jacksona\nD. napady skroniowe zazwyczaj są krótkie i występują często podczas snu\nE. napady mające swoje źródło w płacie czołowym zazwyczaj przebiegają z zaburzeniami świadomości", "a": "C. przykładem napadu ogniskowego z płata czołowego jest napad ruchowy typu Jacksona (egzamin neurologia II 2026 cykl A-3.docx, pyt. 39)"}, {"chapter": "Zaburzenia świadomości, śpiączka i śmierć mózgu", "q": "Zaburzenia świadomości, śpiączka i śmierć mózgu: co trzeba pamiętać o: ten punkt?", "a": "Świadomość ma komponent przytomności i treści; zaburzenia mogą wynikać z uszkodzenia pnia/układu siatkowatego albo rozlanego uszkodzenia półkul."}, {"chapter": "Zaburzenia świadomości, śpiączka i śmierć mózgu", "q": "Zaburzenia świadomości, śpiączka i śmierć mózgu: co trzeba pamiętać o: Ocena śpiączki?", "a": "Ocena śpiączki: reakcja na bodźce, źrenice, ruchy gałek, odruchy pniowe, tor oddychania, napięcie i objawy ogniskowe."}, {"chapter": "Zaburzenia świadomości, śpiączka i śmierć mózgu", "q": "Zaburzenia świadomości, śpiączka i śmierć mózgu: co trzeba pamiętać o: ten punkt?", "a": "GCS obejmuje otwieranie oczu, odpowiedź słowną i ruchową; pomaga opisać ciężkość, ale nie zastępuje lokalizacji."}, {"chapter": "Zaburzenia świadomości, śpiączka i śmierć mózgu", "q": "Zaburzenia świadomości, śpiączka i śmierć mózgu: co trzeba pamiętać o: Przyczyny śpiączki?", "a": "Przyczyny śpiączki: strukturalne, metaboliczne, toksyczne, infekcyjne, napadowe, pourazowe i naczyniowe."}, {"chapter": "Zaburzenia świadomości, śpiączka i śmierć mózgu", "q": "Zaburzenia świadomości, śpiączka i śmierć mózgu: co trzeba pamiętać o: Śmierć mózgu?", "a": "Śmierć mózgu: nieodwracalne ustanie czynności całego mózgu, zwłaszcza pnia, przy spełnieniu warunków i wykluczeniu czynników odwracalnych."}, {"chapter": "Zaburzenia świadomości, śpiączka i śmierć mózgu", "q": "Zaburzenia świadomości, śpiączka i śmierć mózgu: co trzeba pamiętać o: ten punkt?", "a": "Śpiączka metaboliczna zwykle jest bardziej symetryczna; ogniskowe objawy i asymetria źrenic pchają w stronę strukturalną."}, {"chapter": "Zaburzenia świadomości, śpiączka i śmierć mózgu", "q": "Zaburzenia świadomości, śpiączka i śmierć mózgu: co trzeba pamiętać o: ten punkt?", "a": "Przed rozpoznaniem śmierci mózgu trzeba wykluczyć hipotermię, zatrucia, leki depresyjne i zaburzenia metaboliczne."}, {"chapter": "Zaburzenia świadomości, śpiączka i śmierć mózgu", "q": "Zaburzenia świadomości, śpiączka i śmierć mózgu: co trzeba pamiętać o: Pnień mózgu testujesz oczami, źrenicami, rogówką, kaszlem, oddechem.?", "a": "Pnień mózgu testujesz oczami, źrenicami, rogówką, kaszlem, oddechem."}, {"chapter": "Zaburzenia świadomości, śpiączka i śmierć mózgu", "q": "Zaburzenia świadomości, śpiączka i śmierć mózgu: odtwórz fakt ze skryptu zaczynający się od: najczęstszą przyczyną bezsenności są zaburzenia psychiczne (dystymia,...", "a": "najczęstszą przyczyną bezsenności są zaburzenia psychiczne (dystymia, depresja, lęk, stres, OCD) bezsenność przygodna, krótkotrwała - lek nasenny + higiena snu bezsenność przewlekła - terapia poznawczo-behawioralna"}, {"chapter": "Zaburzenia świadomości, śpiączka i śmierć mózgu", "q": "Zaburzenia świadomości, śpiączka i śmierć mózgu: co pamiętasz o: leczenie?", "a": "TLPD i SSRI, selegilina, modafinil, drzemki w czasie dnia, pochodne amfetaminy"}, {"chapter": "Zaburzenia świadomości, śpiączka i śmierć mózgu", "q": "Zaburzenia świadomości, śpiączka i śmierć mózgu: odtwórz fakt ze skryptu zaczynający się od: Parasomnia (somnambulizm lub lęki nocne) różnicowanie z padaczką i zab....", "a": "Parasomnia (somnambulizm lub lęki nocne) różnicowanie z padaczką i zab. psychiatrycznymi"}, {"chapter": "Zaburzenia świadomości, śpiączka i śmierć mózgu", "q": "Zaburzenia świadomości, śpiączka i śmierć mózgu: odtwórz fakt ze skryptu zaczynający się od: Świadomość - zdolność do prawidłowego postrzegania samego siebie i...", "a": "Świadomość - zdolność do prawidłowego postrzegania samego siebie i otoczenia. Wymaga zachowania przytomności ze zdolnością do reagowania na adekwatne bodźce."}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Zespól rzekomoopuszkowy objawia się jako:\nA. Dysfagia, dyzartria\nB. Zaniki mięśni języka ( a one nie występują przy zespole opuszkowym?)\nC. Wygórowane odruchy podniebienne, gardłowe oraz żuchwowy\nD. + b\nE. + c, a nie to?", "a": "E. + c, a nie to? (egzamin neurologia 2026 cykl A-2.docx, pyt. 64)"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "25-letnia pacjentka zgłosiła się na SOR z powodu nagłego pogorszenia widzenia w jednym oku z towarzyszącym bólem przy poruszaniu gałką oczną oraz zaburzeniami rozpoznawania barw. Dwa tygodnie wcześniej leczyła się na zapalenie zatok. W badaniu dna oka: odskroniowe zblednięcie tarczy nerwu wzrokowego, tarcza płaska o wyraźnie zaznaczonych granicach. Objawy i obraz dna oka sugerują:\nA. Pozagałkowe zapalenie nerwu wzrokowego\nB. Śródgałkowe zapalenie nerwu wzrokowego\nC. Zanik nerwu wzrokowego\nD. Neuropatię nerwu wzrokowego\nE. Nowotwór nerwu wzrokowego", "a": "A. Pozagałkowe zapalenie nerwu wzrokowego (egzamin neurologia 2026 cykl A-2.docx, pyt. 66)"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Z zanikami mięśniowymi drobnych mięśni rak spotykamy się w poniższych jednostkach chorobowych ZA WYJATKIEM:\nA. Stwardnienia zanikowego bocznego\nB. Zespołu żebra szyjnego\nC. Neuropatii ruchowej z blokiem przewodzenia\nD. Uszkodzenia splotu ramiennego górnego ( Erba)\nE. Dystrofii odsiebnej Welander", "a": "D. Uszkodzenia splotu ramiennego górnego ( Erba) (egzamin neurologia 2026 cykl A-2.docx, pyt. 72)"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Ktöre określenie NIE PASUJE de dystrofii miçiniowej Duchenne s\nA. rzekomy przerost mięśni łydek\nB. wyraźny wzrost aktywności kinazy kreatynowej\nC. deficyt emeryny w błonie jądrowej\nD. początek zachorowania około 3-4 roku życia\nE. choroba związana jest z mutacja genu na chromosomie X", "a": "C. deficyt emeryny w błonie jądrowej (egzamin neurologia 2026 cykl A-2.docx, pyt. 73)"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Młody mężczyzna z łagodnie postępującym osłabieniem mięśni od dzieciństwa, z przykurczami w stawach, bez rzekomego przerostu mięśni łydek. Chory sprawny intelektualnie, pracował, poruszał się chodząc na palcach. Miał rozpoznaną kardiomiopatię. Zmarł nagle z powodu zaburzeń rytmu serca. Z tego opisu możemy przypuszczać ,że pacjent chorowal na:\nA. Dystrofia Bekera\nB. Dystrofia Duchenne' a\nC. Dystrofia odsiebna Welander\nD. Dystrofia mięśniowa twarzowo-łopatkowo-ramieniowa\nE. Dystrofia Emery' ego-Dreiffusa", "a": "E. Dystrofia Emery' ego-Dreiffusa (egzamin neurologia 2026 cykl A-2.docx, pyt. 74)"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "W zespole Lamberta-Eatona NIE SPODZIEWAMY SIĘ wyraźnej poprawy po leczeniu:\nA. Sterydami\nB. Inhibitorami esterazy cholinowej\nC. Lekami immunosupresyjnymi\nD. Plazmafereza\nE. Immunoglobulinami", "a": "B. Inhibitorami esterazy cholinowej (egzamin neurologia 2026 cykl A-2.docx, pyt. 77)"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Z. paramiotomią wrodzoną wiążemy następujące stwierdzenia ZA WYJĄTKIEM:\nA. W obrazie histopatologicznym występują nitkowate struktury wewnątrz włókien\nB. Defekt genetyczny dotyczy kanałów sodowych w mięśniu szkieletowym mięśniowych\nC. Obserwuje się upośledzenie rozkurczu miçśni\nD. Objawy chorobowe pojawiają się pod wpływem zimna\nE. Mogą występować wiotkie porażenia mięśni", "a": "A. W obrazie histopatologicznym występują nitkowate struktury wewnątrz włókien (egzamin neurologia 2026 cykl A-2.docx, pyt. 78)"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Który objaw, NIE PASUJE de polineuropatii:\nA. zaburzenia czucia o charakterze rękawiczek i skarpetek\nB. dolegliwości bólowe\nC. impotencja\nD. hypotonia ortostatyczna\nE. chód kaczkowaty", "a": "E. chód kaczkowaty (egzamin neurologia 2026 cykl A-2.docx, pyt. 79)"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Pacjenci z podwöjnie seronegatywną miastenią :\nA. Mają tylko przeciwciała przeciw białku LRP4 ( lipoprotein related protein 4)\nB. Nie mają przeciwciał przeciw receptorom dla acetylocholiny ( AChR) i przeciw kinazie tyrozynowej (anty-MuSK )\nC. Nie mają przeciwciał przeciw receptorom dla acetylocholiny (AChR ) i przeciw tytynie (anti-TITIN)\nD. Nie mają przeciwciał przeciw białkom włókna mięśniowego przeciw przeciw tytynie (anti-TITIN), rianodynie (anti-RyR) i rapsynie (anti-RAPSN).\nE. Nie mają przeciwciał charakterystycznych dla miastenii, natomiast mają przeciwciała charakterystyczne dla innych chorób autoimmunologicznych.", "a": "B. Nie mają przeciwciał przeciw receptorom dla acetylocholiny ( AChR) i przeciw kinazie tyrozynowej (anty-MuSK ) (egzamin neurologia 2026 cykl A-2.docx, pyt. 80)"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Które z poniższych stwierdzeń nie pasuje do zespołu Lamberta-Eatona:\nA. występuje nużliwość mięśni w zakresie kończyn dolnych i obręczy biodrowej\nB. brak odruchów kolanowych\nC. najczęściej chorują mężczyźni\nD. w elektromiograficznej próbie stymulacyjnej znamienny jest spadek amplitudy potencjałów\nE. schorzenie współistnieje najczęściej z rakiem drobnokomórkowym płuc", "a": "D. w elektromiograficznej próbie stymulacyjnej znamienny jest spadek amplitudy potencjałów (egzamin neurologia II 2026 cykl A-3.docx, pyt. 24)"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Do wieloogniskowej neuropatii ruchowej z blokiem przewodzenia pasują następujące stwierdzenia z wyjątkiem:\nA. nie stwierdza się zwolnienia szybkości przewodzenia we włóknach czuciowych\nB. przebieg choroby jest powolny, stopniowo postępujący\nC. występują dodatkowo objawy piramidowe\nD. chora najczęściej rozpoczyna się od asymetrycznego zaniku mięśni rąk\nE. pacjenci pozytywnie reagują na leczenie immunoglobulinami", "a": "C. występują dodatkowo objawy piramidowe (egzamin neurologia II 2026 cykl A-3.docx, pyt. 25)"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Wybierz prawidłową odpowiedź. Elektromiografia pojedynczego włókna z oceną Jittera:\nA. pokazuje deficyty w zakresie fali F\nB. przydatna w ocenie zaburzeń przewodzenia na poziomie nerwu rdzeniowego\nC. w przypadku bloku postsynaptycznego nieprzydatna diagnostycznie\nD. jest dodatnia tylko w zespołach miastenicznych\nE. czuła metoda wskazująca na zaburzenia transmisji w złączu nerwowo-mięśniowym w przypadkach wątpliwych", "a": "E. czuła metoda wskazująca na zaburzenia transmisji w złączu nerwowo-mięśniowym w przypadkach wątpliwych (egzamin neurologia II 2026 cykl A-3.docx, pyt. 26)"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "W badaniu EMG znaleziono wielofazowe potencjały o niskiej amplitudzie i skróconym średnim czasie trwania. Przy niewielkim skurczu mięśnia uzyskano zapis interferencyjna wskazujący na zaburzenia gradacji zapisu. Taki zapis znaleziono u pacjenta chorującego z powodu:\nA. jamistości rdzenia\nB. polineuropatii cukrzycowej\nC. dystrofii mięśniowej kończynowo-obręczowej\nD. rdzeniowy zanik mięśni\nE. zespołu lamberta-eatona", "a": "C. dystrofii mięśniowej kończynowo-obręczowej (egzamin neurologia II 2026 cykl A-3.docx, pyt. 27)"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie: co trzeba pamiętać o: Polineuropatia?", "a": "Polineuropatia: zwykle symetryczne, dystalne zaburzenia czucia i osłabienie, często 'skarpetki i rękawiczki', osłabione odruchy."}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie: co trzeba pamiętać o: Neuropatia aksonalna?", "a": "Neuropatia aksonalna: spadek amplitudy w ENG, często dystalna. Demielinizacyjna: zwolnienie przewodzenia, bloki i wydłużone latencje."}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie: co trzeba pamiętać o: ten punkt?", "a": "GBS: ostra zapalna poliradikuloneuropatia, wstępujące osłabienie, arefleksja, możliwe zaburzenia autonomiczne i oddechowe, rozszczepienie białkowo-komórkowe w PMR."}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie: co trzeba pamiętać o: ten punkt?", "a": "CIDP: przewlekły odpowiednik demielinizacyjny z postępem ponad tygodnie/miesiące."}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie: co trzeba pamiętać o: Miastenia?", "a": "Miastenia: męczliwość, opadanie powiek, diplopia, dyzartria/dysfagia, poprawa po odpoczynku; przeciwciała przeciw AChR lub MuSK."}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie: co trzeba pamiętać o: ten punkt?", "a": "Nerw = czucie plus odruchy; mięsień = proksymalne osłabienie bez czucia; złącze = męczliwość."}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie: co trzeba pamiętać o: ten punkt?", "a": "Miastenia pogarsza się wysiłkiem, Lambert-Eaton może chwilowo poprawiać się po aktywacji."}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie: co trzeba pamiętać o: GBS pilnuje oddechu i autonomii.?", "a": "GBS pilnuje oddechu i autonomii."}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie: odtwórz fakt ze skryptu zaczynający się od: Jeżeli nie można wykonać tych badań (uszkodzenie twarzoczaszki,...", "a": "Jeżeli nie można wykonać tych badań (uszkodzenie twarzoczaszki, uszkodzenie podnamiotowe mózgu, zatrucie)"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie: co pamiętasz o: należy przeprowadzić badania instrumentalne?", "a": "EEG, ocenę krążenia mózgowego i multimodalne potencjały"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie: co pamiętasz o: Rozpoznanie śmierci mózgu w pierwotnym uszkodzeniu nadnamiotowym?", "a": "Rozpoznanie śmierci mózgu w pierwotnym uszkodzeniu nadnamiotowym:"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie: odtwórz fakt ze skryptu zaczynający się od: badania kliniczne 2x w odstępie 6h - w obu bezdech i brak odruchów...", "a": "badania kliniczne 2x w odstępie 6h - w obu bezdech i brak odruchów pniowych LUB 2 badania kliniczne (między jednym i drugim odstęp 3 h) + jedno instrumentalne"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie: co pamiętasz o: Rozpoznanie śmierci w pierwotnym podnamiotowym uszkodzeniu?", "a": "Rozpoznanie śmierci w pierwotnym podnamiotowym uszkodzeniu:"}, {"chapter": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie", "q": "Nerwy obwodowe, złącze nerwowo-mięśniowe i mięśnie: odtwórz fakt ze skryptu zaczynający się od: wykazanie linii izelektrycznej w EEG LUB brak przepływu w nn....", "a": "wykazanie linii izelektrycznej w EEG LUB brak przepływu w nn. mózgowych"}, {"chapter": "Choroby neuronu ruchowego", "q": "Choroby neuronu ruchowego: co trzeba pamiętać o: ten punkt?", "a": "SLA/ALS: współistnienie objawów górnego i dolnego neuronu ruchowego w różnych regionach, postęp, brak istotnych zaburzeń czucia."}, {"chapter": "Choroby neuronu ruchowego", "q": "Choroby neuronu ruchowego: co trzeba pamiętać o: Objawy górnego neuronu?", "a": "Objawy górnego neuronu: spastyczność, wygórowane odruchy, Babiński. Objawy dolnego: zaniki, fascykulacje, osłabienie, obniżone odruchy."}, {"chapter": "Choroby neuronu ruchowego", "q": "Choroby neuronu ruchowego: co trzeba pamiętać o: Postać opuszkowa?", "a": "Postać opuszkowa: dyzartria, dysfagia, zanik/fascykulacje języka, ryzyko aspiracji."}, {"chapter": "Choroby neuronu ruchowego", "q": "Choroby neuronu ruchowego: co trzeba pamiętać o: ten punkt?", "a": "SMA: genetyczna choroba dolnego neuronu ruchowego z wiotkością i zanikiem mięśni."}, {"chapter": "Choroby neuronu ruchowego", "q": "Choroby neuronu ruchowego: co trzeba pamiętać o: Choroba Kennedy'ego/SBMA?", "a": "Choroba Kennedy'ego/SBMA: sprzężona z X, objawy opuszkowo-rdzeniowe i cechy androgenowe."}, {"chapter": "Choroby neuronu ruchowego", "q": "Choroby neuronu ruchowego: co trzeba pamiętać o: SLA = ruch bez czucia, UMN plus LMN, postępuje.?", "a": "SLA = ruch bez czucia, UMN plus LMN, postępuje."}, {"chapter": "Choroby neuronu ruchowego", "q": "Choroby neuronu ruchowego: co trzeba pamiętać o: ten punkt?", "a": "Fascykulacje języka i dysfagia każą myśleć o opuszkowym zajęciu neuronu ruchowego."}, {"chapter": "Choroby neuronu ruchowego", "q": "Choroby neuronu ruchowego: co trzeba pamiętać o: SMA to dolny neuron, nie mieszany obraz jak SLA.?", "a": "SMA to dolny neuron, nie mieszany obraz jak SLA."}, {"chapter": "Choroby neuronu ruchowego", "q": "Choroby neuronu ruchowego: odtwórz fakt ze skryptu zaczynający się od: Paramiotonia wrodzona - AD, mutacje kanału Na+ (SCN4A), objawy nasilają...", "a": "Paramiotonia wrodzona - AD, mutacje kanału Na+ (SCN4A), objawy nasilają się pod wpływem zimna (co widać w"}, {"chapter": "Choroby neuronu ruchowego", "q": "Choroby neuronu ruchowego: odtwórz fakt ze skryptu zaczynający się od: mutacje w genie kanału Ca2+ samoistne napady porażenia mięśni związane...", "a": "mutacje w genie kanału Ca2+ samoistne napady porażenia mięśni związane ze ↓ K+ napad po odpoczynku i spożyciu dużej ilości węglowodanów (insulina -> ↓ K+), w nocy albo rano"}, {"chapter": "Choroby neuronu ruchowego", "q": "Choroby neuronu ruchowego: co pamiętasz o: leczenie napady?", "a": "podawanie p.o. K+ (20-100 mEq)"}, {"chapter": "Neurologia w chorobach systemowych i zaburzenia psychiczne", "q": "Neurologia w chorobach systemowych i zaburzenia psychiczne: co trzeba pamiętać o: ten punkt?", "a": "Zaburzenia metaboliczne mogą dawać encefalopatię, śpiączkę, drgawki, mioklonie i neuropatie - zawsze myśl o glukozie, sodzie, nerkach, wątrobie i tarczycy."}, {"chapter": "Neurologia w chorobach systemowych i zaburzenia psychiczne", "q": "Neurologia w chorobach systemowych i zaburzenia psychiczne: co trzeba pamiętać o: Cukrzyca?", "a": "Cukrzyca: polineuropatia dystalna, mononeuropatie, radikulopleksopatia, ryzyko udaru i encefalopatii przy zaburzeniach glikemii."}, {"chapter": "Neurologia w chorobach systemowych i zaburzenia psychiczne", "q": "Neurologia w chorobach systemowych i zaburzenia psychiczne: co trzeba pamiętać o: Choroby tarczycy?", "a": "Choroby tarczycy: miopatie, neuropatie, zaburzenia poznawcze i nastroju; niedoczynność może przypominać spowolnienie/otępienie."}, {"chapter": "Neurologia w chorobach systemowych i zaburzenia psychiczne", "q": "Neurologia w chorobach systemowych i zaburzenia psychiczne: co trzeba pamiętać o: Niedobory?", "a": "Niedobory: B12 daje mielopatię sznurową, neuropatię i zaburzenia poznawcze; tiamina daje Wernickego."}, {"chapter": "Neurologia w chorobach systemowych i zaburzenia psychiczne", "q": "Neurologia w chorobach systemowych i zaburzenia psychiczne: co trzeba pamiętać o: ten punkt?", "a": "Choroby autoimmunologiczne i nowotwory mogą wywoływać zapalenia naczyń, neuropatie, encefalopatie i zespoły paranowotworowe."}, {"chapter": "Neurologia w chorobach systemowych i zaburzenia psychiczne", "q": "Neurologia w chorobach systemowych i zaburzenia psychiczne: co trzeba pamiętać o: B12 = sznury tylne plus piramidy plus neuropatia.?", "a": "B12 = sznury tylne plus piramidy plus neuropatia."}, {"chapter": "Neurologia w chorobach systemowych i zaburzenia psychiczne", "q": "Neurologia w chorobach systemowych i zaburzenia psychiczne: co trzeba pamiętać o: ten punkt?", "a": "Neurologiczny objaw u pacjenta z rakiem może być przerzutem, zakrzepicą, lekiem albo paranowotworowy."}, {"chapter": "Neurologia w chorobach systemowych i zaburzenia psychiczne", "q": "Neurologia w chorobach systemowych i zaburzenia psychiczne: co trzeba pamiętać o: ten punkt?", "a": "Depresja może udawać otępienie, ale też często współistnieje z chorobą neurologiczną."}, {"chapter": "Neurologia w chorobach systemowych i zaburzenia psychiczne", "q": "Neurologia w chorobach systemowych i zaburzenia psychiczne: odtwórz fakt ze skryptu zaczynający się od: Dziedziczona AD (lub mutacja spontaniczna) choroba przebiegająca ze...", "a": "Dziedziczona AD (lub mutacja spontaniczna) choroba przebiegająca ze zwyrodnieniem dolnego i górnego neuronu rozpoczyna się w wieku średnim i starszym, zwykle > 40 rż."}, {"chapter": "Neurologia w chorobach systemowych i zaburzenia psychiczne", "q": "Neurologia w chorobach systemowych i zaburzenia psychiczne: odtwórz fakt ze skryptu zaczynający się od: toksyczne działanie aminokwasów pobudzających (glutaminian) na...", "a": "toksyczne działanie aminokwasów pobudzających (glutaminian) na motoneurony toksyczne działanie SOD-1 (dysmutazy nadtlenkowej) stres oksydacyjny dezorganizacja mikrofilamentów"}, {"chapter": "Neurologia w chorobach systemowych i zaburzenia psychiczne", "q": "Neurologia w chorobach systemowych i zaburzenia psychiczne: odtwórz fakt ze skryptu zaczynający się od: porażenie opuszkowe i rzekomoopuszkowe postać z zajęciem tylko dolnego...", "a": "porażenie opuszkowe i rzekomoopuszkowe postać z zajęciem tylko dolnego motoneuronu (postępujący zanik rdzeniowy) postać z zajęciem tylko górnego motoneuronu"}, {"chapter": "Neurologia w chorobach systemowych i zaburzenia psychiczne", "q": "Neurologia w chorobach systemowych i zaburzenia psychiczne: odtwórz fakt ze skryptu zaczynający się od: Zaburzenia neurologiczne w schorzeniach spoza układu...", "a": "Zaburzenia neurologiczne w schorzeniach spoza układu nerwowego"}, {"chapter": "Neurologia w chorobach systemowych i zaburzenia psychiczne", "q": "Neurologia w chorobach systemowych i zaburzenia psychiczne: odtwórz fakt ze skryptu zaczynający się od: Zaburzenia układu krążenia encefalopatia niedotlenieniowa lub...", "a": "Zaburzenia układu krążenia encefalopatia niedotlenieniowa lub niedokrwienna trwałe uszkodzenie mózgowia, gdy niedotlenienie (np. w NZK) trwa > 3-5 min."}, {"chapter": "Ból, wady rozwoju OUN i neurologia dziecięca", "q": "Ból, wady rozwoju OUN i neurologia dziecięca: co trzeba pamiętać o: ten punkt?", "a": "Ból receptorowy/nocyceptywny wynika z pobudzenia receptorów bólowych; neuropatyczny z uszkodzenia układu somatosensorycznego; psychogenny z dominującym mechanizmem psychologicznym."}, {"chapter": "Ból,
