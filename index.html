<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NeuroSprint 48h</title>
  <style>
:root {
  color-scheme: light;
  --ink: #17212b;
  --muted: #667085;
  --line: #d8dee7;
  --bg: #f5f7f8;
  --panel: #ffffff;
  --teal: #0e6b67;
  --blue: #16324f;
  --coral: #c84f4a;
  --amber: #a66a00;
  --green: #26734d;
  --shadow: 0 8px 24px rgba(22, 50, 79, 0.08);
}
* { box-sizing: border-box; }
html, body { margin: 0; min-height: 100%; }
body {
  font-family: Arial, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background:
    linear-gradient(135deg, rgba(14, 107, 103, 0.09), rgba(255,255,255,0) 34%),
    linear-gradient(180deg, #f7f8f4 0%, #eef3f5 54%, #f8f7f2 100%);
  color: var(--ink);
  font-size: 15px;
}
button, input {
  font: inherit;
}
.app {
  display: grid;
  grid-template-columns: 320px minmax(0, 1fr);
  min-height: 100vh;
}
.side {
  background:
    linear-gradient(180deg, #f8fbfa 0%, #eef3f2 100%);
  border-right: 1px solid var(--line);
  padding: 18px 14px;
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: auto;
}
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
  padding: 10px;
  border: 1px solid rgba(14, 107, 103, 0.16);
  border-radius: 8px;
  background: rgba(255,255,255,0.72);
}
.brand-mark {
  width: 34px;
  height: 34px;
  border-radius: 8px;
  background: conic-gradient(from 220deg, var(--teal), #315f9b, var(--coral), #d9a441, var(--teal));
  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.75);
}
h1, h2, h3 { margin: 0; letter-spacing: 0; }
.brand h1 {
  font-size: 20px;
  line-height: 1.1;
}
.brand small {
  color: var(--muted);
  font-weight: 700;
}
.search {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 10px 11px;
  background: #fff;
  margin: 8px 0 12px;
}
.tabs, .tools {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.filters {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 5px;
  margin: 0 0 12px;
}
.tab, .tool-btn, .chapter-btn, .primary {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  border-radius: 6px;
  padding: 8px 10px;
  cursor: pointer;
  text-decoration: none;
  transition: transform 140ms ease, border-color 140ms ease, background 140ms ease, color 140ms ease;
}
.tab:hover, .tool-btn:hover, .chapter-btn:hover, .primary:hover {
  transform: translateY(-1px);
  border-color: rgba(14, 107, 103, 0.42);
}
.tab.active, .chapter-btn.active, .primary {
  background: var(--blue);
  color: #fff;
  border-color: var(--blue);
}
.tool-btn.done {
  border-color: rgba(38, 115, 77, 0.35);
  color: var(--green);
}
.filter {
  border: 1px solid var(--line);
  background: rgba(255,255,255,0.72);
  border-radius: 6px;
  padding: 7px 5px;
  color: #344054;
  cursor: pointer;
  font-size: 12px;
  font-weight: 700;
}
.filter.active {
  background: var(--teal);
  border-color: var(--teal);
  color: #fff;
}
.progress {
  height: 8px;
  border-radius: 999px;
  background: #dfe7e6;
  overflow: hidden;
  margin: 8px 0 14px;
}
.progress > span {
  display: block;
  height: 100%;
  width: 0%;
  background: linear-gradient(90deg, var(--teal), var(--green));
}
.chapter-list {
  display: grid;
  gap: 7px;
}
.chapter-btn {
  width: 100%;
  text-align: left;
  display: grid;
  grid-template-columns: 22px 1fr auto;
  gap: 8px;
  align-items: center;
  min-height: 42px;
  border-left: 4px solid transparent;
  box-shadow: 0 2px 10px rgba(22, 50, 79, 0.04);
}
.chapter-btn:has(.badge.a) {
  border-left-color: var(--coral);
}
.chapter-btn:has(.badge.b) {
  border-left-color: var(--amber);
}
.chapter-btn .check {
  width: 18px;
  height: 18px;
  border: 1px solid #9aa8b5;
  border-radius: 4px;
  display: inline-grid;
  place-items: center;
  color: #fff;
  font-size: 12px;
}
.chapter-btn.complete .check {
  background: var(--green);
  border-color: var(--green);
}
.chapter-btn strong {
  font-size: 13px;
  line-height: 1.2;
}
.badge {
  font-size: 11px;
  font-weight: 700;
  border-radius: 4px;
  padding: 3px 5px;
  color: #fff;
}
.badge.a { background: var(--coral); }
.badge.b { background: var(--amber); }
.main {
  padding: 22px;
  overflow: auto;
}
.topbar {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
  margin-bottom: 16px;
  color: #fff;
  background:
    linear-gradient(135deg, rgba(22,50,79,0.98) 0%, rgba(14,107,103,0.96) 62%, rgba(200,79,74,0.92) 100%);
  border-radius: 8px;
  padding: 18px;
  box-shadow: 0 14px 32px rgba(22, 50, 79, 0.18);
}
.topbar h2 {
  font-size: 24px;
}
.topbar .meta {
  color: rgba(255,255,255,0.78);
  font-size: 13px;
}
.topbar .tool-btn {
  background: rgba(255,255,255,0.12);
  color: #fff;
  border-color: rgba(255,255,255,0.28);
}
.status-panel {
  display: grid;
  grid-template-columns: repeat(5, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}
.metric {
  background: rgba(255,255,255,0.78);
  border: 1px solid rgba(216, 222, 231, 0.95);
  border-radius: 8px;
  padding: 12px;
  box-shadow: var(--shadow);
  min-height: 78px;
}
.metric span {
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
}
.metric strong {
  display: block;
  font-size: 24px;
  margin-top: 5px;
  color: var(--blue);
}
.metric em {
  display: block;
  color: var(--muted);
  font-style: normal;
  font-size: 12px;
  margin-top: 3px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.view {
  display: none;
}
.view.active {
  display: block;
}
.panel {
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 8px;
  box-shadow: var(--shadow);
  padding: 16px;
  margin-bottom: 14px;
  position: relative;
}
.chapter-head {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: flex-start;
  border-bottom: 1px solid var(--line);
  padding-bottom: 12px;
  margin-bottom: 12px;
}
.chapter-head h2 {
  font-size: 26px;
  line-height: 1.1;
}
.chapter-head p {
  margin: 8px 0 0;
  color: var(--muted);
  line-height: 1.45;
}
.pill-row {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}
.pill {
  border: 1px solid var(--line);
  border-radius: 999px;
  padding: 5px 8px;
  font-size: 12px;
  background: #f8fafc;
  color: #314154;
  white-space: nowrap;
}
.grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}
.quick-grid {
  display: grid;
  grid-template-columns: minmax(0, 1.25fr) minmax(280px, 0.75fr);
  gap: 14px;
  margin-bottom: 14px;
}
.visual-stack {
  display: grid;
  gap: 12px;
}
.visual-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  overflow: hidden;
  background: #fff;
}
.visual-card header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 12px;
  background: #f3f7f6;
  border-bottom: 1px solid var(--line);
  font-weight: 800;
  color: var(--blue);
}
.icon {
  width: 18px;
  height: 18px;
  display: inline-block;
  flex: 0 0 18px;
}
.icon svg {
  width: 18px;
  height: 18px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2.2;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.visual-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.visual-table th,
.visual-table td {
  text-align: left;
  vertical-align: top;
  border-bottom: 1px solid #e7edf2;
  padding: 8px 9px;
  line-height: 1.32;
}
.visual-table th {
  color: #fff;
  background: var(--blue);
  font-size: 12px;
}
.visual-table tr:last-child td {
  border-bottom: 0;
}
.flow-list {
  display: grid;
  gap: 8px;
  padding: 12px;
}
.flow {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  align-items: center;
}
.flow-step {
  border: 1px solid #cdd8df;
  background: #fbfcfd;
  border-radius: 6px;
  padding: 7px 9px;
  line-height: 1.25;
  font-size: 13px;
}
.flow-arrow {
  color: var(--teal);
  font-weight: 900;
}
.memo-list {
  display: grid;
  gap: 8px;
  padding: 12px;
}
.memo {
  display: grid;
  grid-template-columns: 22px 1fr;
  gap: 8px;
  align-items: start;
  border: 1px solid #e3e9ef;
  background: #fbfcfd;
  border-radius: 7px;
  padding: 8px;
  line-height: 1.35;
}
.memo .tag {
  width: 22px;
  height: 22px;
  border-radius: 6px;
  display: inline-grid;
  place-items: center;
  background: var(--teal);
  color: #fff;
}
.section h3 {
  font-size: 15px;
  margin-bottom: 8px;
  color: var(--teal);
  display: inline-block;
  border-bottom: 2px solid rgba(14,107,103,0.22);
  padding-bottom: 3px;
}
ul {
  margin: 0;
  padding-left: 18px;
}
li {
  margin: 0 0 7px;
  line-height: 1.42;
}
.qa {
  display: grid;
  gap: 8px;
}
.qa details {
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fbfcfd;
  padding: 9px 10px;
}
.qa summary {
  cursor: pointer;
  font-weight: 700;
}
.qa p {
  color: var(--muted);
  margin: 7px 0 0;
  line-height: 1.45;
}
.exam-list {
  display: grid;
  gap: 10px;
}
.exam-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfcfd;
  padding: 11px;
}
.exam-card strong {
  display: block;
  line-height: 1.35;
  margin-bottom: 8px;
}
.option-list {
  display: grid;
  gap: 5px;
  margin: 8px 0;
}
.option {
  display: grid;
  grid-template-columns: 24px 1fr;
  gap: 7px;
  border: 1px solid #e1e8ee;
  border-radius: 6px;
  padding: 7px;
  background: #fff;
  line-height: 1.3;
}
.option.correct {
  border-color: rgba(38, 115, 77, 0.38);
  background: #f0f8f4;
}
.option b {
  color: var(--blue);
}
.source-note {
  color: var(--muted);
  font-size: 12px;
  margin-top: 6px;
}
.source-grid {
  display: grid;
  gap: 10px;
}
.source-box {
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 10px;
  background: #fbfcfd;
}
.source-box h4 {
  margin: 0 0 7px;
  color: var(--blue);
  font-size: 14px;
}
.brain-layout {
  display: grid;
  grid-template-columns: minmax(320px, 0.9fr) minmax(0, 1.1fr);
  gap: 14px;
}
.brain-map {
  position: sticky;
  top: 18px;
  align-self: start;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fbfcfd;
  padding: 14px;
}
.brain-svg {
  width: 100%;
  max-height: 360px;
}
.brain-region {
  cursor: pointer;
  transition: opacity 140ms ease, transform 140ms ease;
}
.brain-region:hover {
  opacity: 0.82;
}
.brain-region.active path,
.brain-region.active ellipse,
.brain-region.active rect {
  stroke: var(--coral);
  stroke-width: 3;
}
.brain-legend {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 6px;
  margin-top: 10px;
}
.legend-btn {
  border: 1px solid var(--line);
  background: #fff;
  border-radius: 6px;
  padding: 7px 8px;
  text-align: left;
  font-size: 12px;
  cursor: pointer;
}
.legend-btn.active {
  border-color: var(--coral);
  background: #fff6f5;
  color: var(--blue);
  font-weight: 800;
}
.center-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.center-card {
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  padding: 11px;
  box-shadow: 0 4px 14px rgba(22, 50, 79, 0.05);
}
.center-card.active {
  border-color: var(--coral);
  box-shadow: 0 8px 22px rgba(200, 79, 74, 0.12);
}
.center-card h3 {
  display: flex;
  align-items: center;
  gap: 8px;
  margin: 0 0 4px;
  color: var(--blue);
  border: 0;
  padding: 0;
}
.center-card .short {
  color: var(--teal);
  font-weight: 800;
  margin-bottom: 8px;
}
.center-card dl {
  margin: 0;
  display: grid;
  gap: 7px;
}
.center-card dt {
  font-size: 12px;
  font-weight: 900;
  color: var(--muted);
  text-transform: uppercase;
}
.center-card dd {
  margin: 0;
  line-height: 1.35;
}
.mnemo-chip {
  display: inline-block;
  margin-top: 7px;
  border-radius: 6px;
  background: #f3f7f6;
  color: var(--teal);
  padding: 6px 8px;
  font-weight: 800;
}
.plan-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 14px;
}
.block {
  border-left: 4px solid var(--teal);
  background: #fbfcfd;
  padding: 10px 12px;
  margin: 8px 0;
  border-radius: 0 6px 6px 0;
}
.flash {
  min-height: 260px;
  display: grid;
  place-items: center;
  text-align: center;
  padding: 22px;
  overflow: hidden;
}
.flash::before {
  content: "";
  position: absolute;
  inset: 0 0 auto 0;
  height: 5px;
  background: linear-gradient(90deg, var(--coral), #d9a441, var(--teal), #315f9b);
}
.flash h3 {
  font-size: 22px;
  line-height: 1.25;
  max-width: 760px;
}
.flash p {
  color: var(--muted);
  font-size: 18px;
  line-height: 1.45;
  max-width: 760px;
}
.answer {
  display: none;
}
.answer.show {
  display: block;
}
.quiz-item {
  border-top: 1px solid var(--line);
  padding: 12px 0;
}
.quiz-item:first-child { border-top: 0; }
.quiz-item strong {
  display: block;
  margin-bottom: 6px;
}
.quiz-item details {
  margin-top: 6px;
}
.empty {
  color: var(--muted);
  padding: 24px;
  text-align: center;
}
@media (max-width: 920px) {
  .app { grid-template-columns: 1fr; }
  .side { position: relative; height: auto; }
  .main { padding: 14px; }
  .grid, .plan-grid, .quick-grid, .brain-layout, .center-grid { grid-template-columns: 1fr; }
  .brain-map { position: relative; top: auto; }
  .status-panel { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  .chapter-list { max-height: 310px; overflow: auto; padding-right: 2px; }
  .chapter-head { display: block; }
  .topbar { display: block; }
}
@media (max-width: 560px) {
  .status-panel { grid-template-columns: 1fr; }
  .filters { grid-template-columns: repeat(2, 1fr); }
}
@media print {
  body { background: #fff; }
  .side, .topbar, .tools, .tabs { display: none !important; }
  .app { display: block; }
  .main { padding: 0; }
  .view { display: block !important; }
  #flashView, #quizView, #planView { display: none !important; }
  .panel { box-shadow: none; break-inside: avoid; border-color: #bbb; }
}
</style>
</head>
<body>
  <div class="app">
    <aside class="side">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"></div>
        <div><h1>NeuroSprint 48h</h1><small><span id="progressText">0%</span> materiału</small></div>
      </div>
      <div class="progress"><span id="progressBar"></span></div>
      <div class="tabs">
        <button class="tab" data-view="learn">Nauka</button>
        <button class="tab" data-view="plan">Plan</button>
        <button class="tab" data-view="flash">Fiszki</button>
        <button class="tab" data-view="quiz">Test</button>
        <button class="tab" data-view="brain">Mózg</button>
      </div>
      <input id="search" class="search" type="search" placeholder="Szukaj tematu">
      <div class="filters">
        <button class="filter" data-filter="all" onclick="setFilter('all')">All</button>
        <button class="filter" data-filter="A" onclick="setFilter('A')">A</button>
        <button class="filter" data-filter="1" onclick="setFilter('1')">Dziś</button>
        <button class="filter" data-filter="2" onclick="setFilter('2')">Jutro</button>
      </div>
      <div id="chapterList" class="chapter-list"></div>
    </aside>
    <main class="main">
      <div class="topbar">
        <div>
          <h2>Neurologia - kondensat</h2>
          <div class="meta">Materiał z PDF-u: NASIOSKRYPT-NEUROLOGIA • <span id="clockText">start 19:15</span></div>
        </div>
        <div class="tools">
          <a class="tool-btn" href="./neuro_sprint_48h.pdf">PDF</a>
          <a class="tool-btn" href="./neuro_fiszki_anki.csv">CSV</a>
          <button class="tool-btn" onclick="panicMode()">Ostatnia godzina</button>
          <button class="tool-btn" onclick="window.print()">Druk</button>
        </div>
      </div>
      <section id="statusPanel" class="status-panel"></section>
      <div id="learnView" class="view"></div>
      <div id="planView" class="view"></div>
      <div id="flashView" class="view"></div>
      <div id="quizView" class="view"></div>
      <div id="brainView" class="view"></div>
    </main>
  </div>
  <script>
const data = {"chapters": [{"id": "badanie", "day": 1, "title": "Badanie neurologiczne", "pages": "6-9", "pdf_start": 7, "pdf_end": 10, "time": "60 min", "priority": "A", "summary": "Najpierw lokalizacja, potem etiologia. Badanie ma odpowiedzieć: czy problem jest w OUN czy obwodowo, czy dotyczy drogi ruchowej, czucia, móżdżku, pnia, nerwów czaszkowych albo korzeni.", "core": ["Kolejność: wrażenie ogólne, mowa i chód, objawy oponowe, nerwy czaszkowe, układ ruchu, odruchy, czucie, objawy korzeniowe, móżdżek, testy dodatkowe.", "Objawy oponowe: sztywność karku, Kernig, Brudziński, Flatau i Herman. W pytaniu egzaminacyjnym łącz je z zapaleniem opon lub krwotokiem podpajęczynówkowym.", "Nerwy czaszkowe ucz się parami funkcji: I węch, II wzrok i dno oka, III-IV-VI ruchy gałek i źrenice, V czucie twarzy i żucie, VII mimika, VIII słuch i równowaga, IX-X gardło i podniebienie, XI SCM/czworoboczny, XII język.", "Skala Lovetta: 0 brak skurczu, 1 ślad, 2 ruch w odciążeniu, 3 ruch przeciw grawitacji, 4 ruch przeciw oporowi, 5 norma.", "Odruchy: biceps C5-C6, triceps C7, promieniowy C5-C6, kolanowy L3-L4, skokowy S1-S2. Patologiczne: Babiński, Rossolimo, Chaddock, Gordon, Oppenheim.", "Móżdżek: ataksja, dysmetria, drżenie zamiarowe, adiadochokineza, oczopląs, mowa skandowana, chód na szerokiej podstawie, hipotonia i odruchy wahadłowe."], "memory": ["Różnicuj Romberga: pogorszenie po zamknięciu oczu sugeruje czucie głębokie/przedsionek; móżdżek daje niestabilność także przy oczach otwartych.", "Język zbacza w stronę uszkodzenia XII, żuchwa w stronę porażoną V, języczek zwykle w stronę zdrową przy IX/X.", "Objaw Lasegue'a to ból po tylnej stronie uda przy unoszeniu wyprostowanej kończyny; Mackiewicz prowokuje ból z przodu uda."], "recall": [["Jak odróżnisz zespół piramidowy od uszkodzenia obwodowego neuronu ruchowego?", "Piramidowy: spastyczność, wygórowane odruchy, objawy patologiczne, niedowład. Obwodowy: wiotkość, zaniki, fascykulacje, osłabione odruchy."], ["Jakie trzy próby ba promieniowej (C5-C6);", "d. Objawy patologiczne:", "i. Trömnera (uderzamy opuszkami palców w opuszkę palca III pacjenta od spodu) -> zgięcie ii. Hoffmana (uderzamy w płytkę paznokcia III) -> zgięcie kciuka iii. Sterling’a (uderzamy w opuszki palców pacjenta od spodu) -> zgięcie palców iv. Jacobsohna ->...", "V. Układ czucia:", "a. powierzchniowy: czucie dotyku, bólu, temperatury;", "VI. Objawy korzeniowe:", "VII. Objawy móżdżkowe ataksja = niezborność ruchowa;"]}, {"id": "diagnostyka", "day": 1, "title": "Badania pomocnicze w neurologii", "pages": "10-13", "pdf_start": 11, "pdf_end": 14, "time": "50 min", "priority": "A", "summary": "Najważniejsze jest skojarzenie badania z pytaniem klinicznym: PMR do infekcji, zapaleń, SM i SAH; EEG do padaczki i śpiączki; EMG/ENG do nerwów i mięśni; potencjały do dróg czuciowych i ruchowych.", "core": ["Punkcja lędźwiowa: zwykle L3-L4, po wykluczeniu wzmożonego ciśnienia śródczaszkowego, zaburzeń krzepnięcia i zakażenia skóry w miejscu wkłucia.", "Prawidłowy PMR: wodojasny, ciśnienie ok. 5-18 cm H2O, białko 0,2-0,4 g/l, glukoza 2,2-3,9 mmol/l lub około 65% surowicy, komórki poniżej 5/ul.", "Rozszczepienie białkowo-komórkowe: wysokie białko bez istotnej pleocytozy, klasycznie w zapalnej poliradikulopatii.", "EEG: alfa 8-13 Hz z tyłu i zanika po otwarciu oczu; beta 14-30 Hz; theta 4-7 Hz; delta 0-3 Hz u czuwającego dorosłego jest patologiczna.", "ENG/elektroneurografia: zwolnienie przewodzenia wskazuje na demielinizację, spadek amplitudy na uszkodzenie aksonalne.", "EMG: w spoczynku powinna być cisza elektryczna; fascykulacje i fibrylacje sugerują patologię jednostki ruchowej."], "memory": ["VEP: fala około 100 ms, wydłużenie latencji sugeruje uszkodzenie drogi wzrokowej.", "BAEP: ocena pnia i nerwu VIII, przydatne m.in. w nerwiaku osłonkowym VIII.", "SSEP: ocena dróg somatosensorycznych, korzeni, splotów, rdzenia i pnia."], "recall": [["Jakie są przeciwwskazania do punkcji lędźwiowej?", "Wzmożone ciśnienie śródczaszkowe/efekt masy, zaburzenia krzepnięcia oraz proces ropny w okolicy wkłucia."], ["Co w PMR sugeruje bakteryjne ZOMR?", "Mętny płyn, wysoka komórkowość z neutrofilami, wysokie białko, obniżona glukoza i często podwyższone mleczany."], ["Jak odróżnisz uszkodzenie aksonalne od demielinizacyjnego w ENG?", "Aksonalne obniża amplitudę odpowiedzi, demielinizacyjne zwalnia szybkość przewodzenia i wydłuża latencje."]], "visuals": {"tables": [{"title": "PMR - różnicowanie w 30 sekund", "columns": ["Stan", "Komórki", "Białko", "Glukoza", "Skojarzenie"], "rows": [["Norma", "<5/ul", "0,2-0,4 g/l", "ok. 65% surowicy", "wodojasny"], ["Bakteryjne ZOMR", "neutrofile", "wysokie", "niskie", "ostry ciężki stan"], ["Wirusowe ZOMR", "limfocyty", "umiarkowanie wysokie", "zwykle norma", "łagodniejsze"], ["Gruźlicze/grzybicze", "limfocyty", "wysokie", "często niskie", "podostre/przewlekłe"], ["GBS", "komórek mało", "wysokie", "norma", "rozszczepienie białkowo-komórkowe"], ["SM", "limfocyty czasem", "zwykle umiarkowane", "norma", "prążki oligoklonalne"], ["SAH", "RBC/ksantochromia", "zmienne", "norma", "gdy TK nie rozstrzyga"]]}, {"title": "Badanie pomocnicze - co wybrać", "columns": ["Problem", "Badanie", "Po co"], "rows": [["Padaczka/śpiączka", "EEG", "iglice, fale ostre, rytmy patologiczne"], ["Demielinizacja drogi wzrokowej", "VEP", "wydłużenie latencji P100"], ["Nerw VIII/pień", "BAEP", "droga słuchowa i pień"], ["Korzeń/splot/rdzeń", "SSEP", "droga czuciowa"], ["Neuropatia", "ENG", "aksonalna = amplituda, demielinizacja = szybkość"], ["Mięsień/jednostka ruchowa", "EMG", "fibrylacje, fascykulacje, wzorzec miogenny/neurogenny"]]}], "schemes": [["Podejrzenie ZOMR", "oceń przeciwwskazania do punkcji", "PMR + posiew/PCR", "leczenie empiryczne nie czeka na perfekcyjny wynik"], ["Osłabienie kończyn", "ENG/EMG", "amplituda niska = akson", "przewodzenie wolne = mielina"]]}, "exam_questions": [], "source_updates": [], "digest_html": ["Pierwsze trzy objawy badamy przy pomocy prób palec-nos i pięta-kolano (zborność tułowia badamy poprzez siadanie z pozycji leżącej bez użycia rąk).", "VIII.Testy dodatkowe:", "w miastenii - badamy apokamnozę - każemy pacjentowi naprzemiennie zamykać i otwierać oczy przez około minutę - obserwujemy, czy następuje męczliwość skutkująca brakiem możliwości otworzenia oczu;", "zaniki mięśniowe i fascykulacje - pojawiają się w uszkodzeniu obwodowego neuronu ruchowego;", "objaw Lhermitte’a - badamy podobnie jak sztywność karku - pacjent zgłasza bolesne przejście „prądu” wzdłuż kręgosłupa - przy uszkodzeniu rdzenia szyjnego (np. w SLA);", "odruchy deliberacyjne -występują w otępieniach - odruch pyszczkowy, objaw dłoniowo-bródkowy, chwyt", "w pozycji embrionalnej, z łukowato wygiętym grzbietem wkłucie poniżej zakończenia RK (L2) - zwykle w przestrzeni międzykręgowej L3-L4 (wyznaczamy ją przez linię poziomą łączącą kolce biodrowe)", "przeciwwskazania:", "wzmożone ciśnienie śródczaszkowe - obrzęk tarczy NC II, efekt masy w badaniu obrazowym zaburzenia krzepnięcia krwi proces ropny w okolicy nakłucia w trakcie można wykonać pomiar ciśnienia w cm H2O próba Queckenstedta - wykonanie pomiaru ciśnienia PMR u...", "prawidłowo: ciśnienie szybko ↑ przy ucisku i szybko ↓ po puszczeniu wolny ↑ lub ↓, brak zmian -> przeszkoda w kanale kręgowym uciśnięcie brzucha -> ↑ ciśnienia PMR = prawidłowe osadzenie igły w przestrzeni podpajęczynówkowej", "Punkcja podpotyliczna - rzadko - wkłucie między kością potyliczną, a kręgiem C1 - bardzo ryzykowne (uszkodzenie t. móżdżkowej tylnej dolnej).", "wizualna - barwa i przejrzystość - wodojasny, przejrzysty jeżeli PMR jest początkowo czerwony, ale po chwili wodojasny, to krew pochodzi z uszkodzonego przy punkcji naczynka płyn żółtawy - ksantochromiczny - rozpad RBC, żółtaczka zmętnienie i żółta barwa -...", "Parametry prawidłowego PMR:", "Białko całkowite 0,2-0,4 g/l", "Indeksy Ig (st. w PMR/ st. w surowicy)", "Qalb (wskaźnik albumin = st. w PMR x 10-3/st. w surow.) 5-8 x 10-3 (zależne od wieku)", "Glukoza 2,2-3,9 mmol/l (65% stężenia w surowicy)", "Liczba komórek < 5/μl (limfocyty < 70%, monocyty > 30%) ↑ białka - procesy zapalne, krwawienie podpajęczynówkowe, nowotwory, schorzenia metaboliczne w zapalnej poliradikulopatii rozszczepienie białkowo-komórkowe (↑ st. białka bez ↑ kom.) - rozpad osłonek...", "Inne badalne rzeczy w PMR:", "mleczany - ↑ w zapaleniu i ch. metabolicznych ferrytyna - ↑ w neurozwyrodnieniowych prekursory amyloidu, esteraza ACh, białko tau - ch. Alzheimera białka 14-3-3 - ↑ w chorobach prionowych", "Spektrofotometria i próba benzydynowa - diagnostyka krwotoku podpajęczynówkowego dowodem krwawienia są erytromakrofagi pod mikroskopem", "Posiew płynu - zrozumiałe biopsja mięśnia - mięsień zmieniony chorobowo, ale bez zaniku i bez wcześniejszego EMG biopsja mózgu - rzadko, wykonywana stereotaktycznie histochemia - gdy podejrzewamy zaburzenia metaboliczne immunocytochemia - diagnostyka guzów", "EEG - elektroencefalografia zapis czynności bioelektrycznej mózgu układ elektrod „10-20” próby aktywacyjne - fotostymulacja, hiperwentylacja, badanie po 24h bezsenności - ↑ czułość", "ocena: częstotliwości, amplitudy, symetrii, synchroniczności , obecności zjawisk patologicznych ilościowe EEG (QEEG) - precyzyjna lokalizacja ogniska padaczkorodnego przed zabiegiem oraz w monitorowaniu chorych w czasie śpiączki polisomnografia = EEG, EKG,...", "Rodzaje fal w EEG:", "dominują w tylnych odprowadzeniach wyższa amplituda zanikają po otwarciu oczu - reakcja zatrzymania - i pojawiają się po ich zamknięciu rytm alfa jest podstawową składową prawidłowej czynności bioelektrycznej wszystkie odprowadzenia, ale najwięcej w...", "w zapaleniu mózgu (uogólnione) czy procesach rozrostowych (ogniskowo, również w zdrowej półkuli jako objaw z oddali). W CJD cykliczne w seriach lub uogólnione.", "fale ostre, iglice, zjawiska złożone - napad padaczkowy potencjały wywołane rejestracja i analiza zmiany czynności bioelektrycznej mózgu w odpowiedzi na bodziec o określonej modalności (bodziec jest powtarzany, a odpowiedź sumowana i uśredniana) mierzymy...", "rozpoznanie tężyczki:", "przygotowujemy warunku niedokrwienia (mankiet do pomiaru RR) i zasadowicy (hiperwentylacja) -> ↑ pobudliwości rytmiczne wyładowania spoczynkowe jednostek ruchowych -> tężyczka pierwotne mięśniowe uszkodzenie mięśnia (miopatia) - ↓ obszaru jednostki..."], "digest_pdf": ["Pierwsze trzy objawy badamy przy pomocy prób palec-nos i pięta-kolano (zborność tułowia badamy poprzez siadanie z pozycji leżącej bez użycia rąk).", "VIII.Testy dodatkowe:", "w miastenii - badamy apokamnozę - każemy pacjentowi naprzemiennie zamykać i otwierać oczy przez około minutę - obserwujemy, czy następuje męczliwość skutkująca brakiem możliwości otworzenia oczu;", "zaniki mięśniowe i fascykulacje - pojawiają się w uszkodzeniu obwodowego neuronu ruchowego;", "objaw Lhermitte’a - badamy podobnie jak sztywność karku - pacjent zgłasza bolesne przejście „prądu” wzdłuż kręgosłupa - przy uszkodzeniu rdzenia szyjnego (np. w SLA);", "odruchy deliberacyjne -występują w otępieniach - odruch pyszczkowy, objaw dłoniowo-bródkowy, chwyt", "w pozycji embrionalnej, z łukowato wygiętym grzbietem wkłucie poniżej zakończenia RK (L2) - zwykle w przestrzeni międzykręgowej L3-L4 (wyznaczamy ją przez linię poziomą łączącą kolce biodrowe)", "przeciwwskazania:", "wzmożone ciśnienie śródczaszkowe - obrzęk tarczy NC II, efekt masy w badaniu obrazowym zaburzenia krzepnięcia krwi proces ropny w okolicy nakłucia w trakcie można wykonać pomiar ciśnienia w cm H2O próba Queckenstedta - wykonanie pomiaru ciśnienia PMR u...", "prawidłowo: ciśnienie szybko ↑ przy ucisku i szybko ↓ po puszczeniu wolny ↑ lub ↓, brak zmian -> przeszkoda w kanale kręgowym uciśnięcie brzucha -> ↑ ciśnienia PMR = prawidłowe osadzenie igły w przestrzeni podpajęczynówkowej", "Punkcja podpotyliczna - rzadko - wkłucie między kością potyliczną, a kręgiem C1 - bardzo ryzykowne (uszkodzenie t. móżdżkowej tylnej dolnej).", "wizualna - barwa i przejrzystość - wodojasny, przejrzysty jeżel ub niedowład połowiczy z przewagą w KG; intelekt zwykle prawidłowy lub nieznacznie obniżony;", "często padaczka z napadami ogniskowymi, w 50% ruchy pląsawicze obustronne porażenie lub obustronny niedowład połowiczy z przewagą w KG; często współwystępują objawy rzekomoopuszkowe i padaczka oraz upośledzenie umysłowe, nasilone zaburzenia mowy obustronne...", "Zaburzenia kontroli postawy i koordynacji - ↓ napięcie mięśniowe wzrokowo-ruchowej - Drżenie zamiarowe", "Prawidłowy intelekt - Dysartryczne zaburzenia mowy", "Postać pozapiramidowa - dyskinetyczna ↓ napięcie mięśniowe (w postaci dystonicznej okresowo wzmożone) rozwój umysłowy prawidłowy", "Najczęściej rozpoznajemy postać spastyczną - ok. 2 rż - pozostałe postacie ok. 3-4 rż.", "Badania pomocnicze - TK, MR, genetyczne", "Farmakologicznie - ↓ napięcia mięśniowego (np. baklofen, benzodiazepiny, miejscowe ostrzykiwanie toksyną", "Selektywna rizotomia korzeni grzbietowych (SDR) - leczenie spastyczności", "Stany zapalne układu nerwowego w wieku rozwojowym", "Objawy niespecyficzne - wymioty i/lub biegunka, żółtaczka, brak łaknienia", "Klasyczna triada - gorączka, wymioty, bóle głowy", "Badania pomocnicze - PMR (preparat bezpośredni, testy lateksowe, posiew, ew. molekularne) + posiew krwi jak najszybciej celowane", "łagodne, samoograniczające, o mniej nasilonych objawach w PMR ↑ liczba komórek (ale umiarkowanie), st. glukozy N (w gruźlicy bardzo ↓↓), st. białka nieco ↑", "Etiologia - wirusy herpes (HSV, CMV), arboi enterowirusy burzliwe, z zaburzeniami świadomości i deficytami ogniskowymi stan ciężki, powolna poprawa jeżeli zapalenie limbiczne - objawy są wynikiem pojawienia się Ab antyneuronalnych", "Badanie PMR (niewielki wzrost komórek limfocytarnych i stężenia białka) - PCR [złoty standard w HSV], odczyny serologiczne, Ab przeciwneuronalne", "Leczenie - zakażenie wirusem herpes - acyklowir, zakażenie CMV - gancyklowir", "Najczęściej występuje pod postacią izolowanych zespołów neurologicznych", "Objawy ubytkowe z pnia  i na ogół pojawiają się niespodziewanie", "Przyczyny napadów padaczkowych:", "Leki przeciwgorączkowe - paracetamol, ibuprofen i/lub fizykalne metody obniżenia temperatury", "W razie przedłużającego się napadu drgawek gorączkowych (> 2-3 min) - diazepam doobytniczo 0,5 mg/kg nie podawać fenobarbitalu i kwasu walproinowego"], "digest_pdf": ["Czynnościowe zaburzenia psychiczne - konwersja (zaburzenia dysocjacyjne) nie mają organicznego podłoża, ale przypominają schorzenia neurologiczne nieprawidłowa integracja wspomnień, poczucia tożsamości, wrażeń i ruchów dowolnych objawy przypominają...", "Hamowanie czucia bólu - układ antynocyceptywny neurony wstawkowe w istocie galaretowatej rogu tylnego RK - tworzą gate control dla bodźców substancja szara okołowodociągowa i okołokomorowa, boczne segmenty mostu, brzuszna cz. RP", "Mediatory czucia bólu:", "Ból neuropatyczny przewlekły, często związany z npl i cukrzycą związany z zaburzeniem czynności lub uszkodzeniem układu nerwowego (zwykle obwodowego) nadmierna aktywacja czuciowa z udziałem układu autonomicznego dysestezje - przykre wrażenia czuciowe...", "linia: TLPD - amitryptylina, imipramina, doksepina ; SSRI - duloksetyna, fluoksetyna (+ nefopam - tylko p/bólowy SSRI!); gabapentyna, pregabalina gabapentyna działa tylko ośrodkowo, a pregabalina też na obwodzie (ale wyd. przez 900 mg gabapentyny = 150 mg...", "TENS - przezskórna elektrostymulacja nerwów (bramkowanie bólu) galwanizacja (rozszerzenie naczyń i modyfikacja aktywności nn. obwodowych) jonoforeza (wprowadzanie leków [NLPZ] za pomocą prądu) termoterapia (↑ przepływu krwi przez tkankę i wypłukanie...", "Zaburzenia neurologiczne związane z nieprawidłowym rozwojem OUN w okresie", "Trisomia 21. pary chromosomów - dodatkowa kopią genu dysmutazy ponadtlenkowej w obrębie 21q opóźnienie rozwoju umysłowego obniżenie napięcia mięśniowego cechy dymorficzne małogłowie z małomózgowiem spłaszczenie czaszki w wymiarze przednio-tylnym skośne...", "Powstają we wczesnym okresie rozw bne kryteria rozpoznania dla dzieci ≥ 2 nieencefalopatyczne (nie o typie ADEM) epizody objawów uszkodzenia OUN o prawdopodobnie zapalnym podłożu, które dzieli > 30 dni i które dotyczą > 1 obszaru OUN 1 nieencefalopatyczny epizod, związany z typową...", "Trzeba różnicować z ostrym rozsianym zapaleniem mózgu i rdzenia (ADEM), które jest schorzeniem demielinizacyjnym, występującym głównie u dzieci, o przebiegu zwykle monofazowym, często poprzedzonym chorobą infekcyjną, szczepieniem, podaniem surowicy lub...", "Trzeba różnicować też z chorobami metabolicznymi, w tym cytopatiami mitochondrialnymi i leukodystrofiami, neuroinfekcjami, zmianami naczyniowymi, chorobami tkanki łącznej i procesami rozrostowymi w obrębie OUN"]}], "cards": [{"chapter": "Badanie neurologiczne", "q": "Ośrodkowe uszkodzenie nerwu twarzowego objawia się jako:\nA. obniżony kącik ust, wygładzony fałd nosowo-wargowy, wygładzone czoło po stronie przeciwnej do uszkodzenia\nB. obniżony kącik ust, wygładzony fałd nosowo-wargowy po stronie przeciwnej do uszkodzenia\nC. zaburzenia smaku w przednich ⅔ języka\nD. a+c\nE. b+c", "a": "B. obniżony kącik ust, wygładzony fałd nosowo-wargowy po stronie przeciwnej do uszkodzenia (egzamin neurologia II 2026 cykl A-3.docx, pyt. 1)"}, {"chapter": "Badanie neurologiczne", "q": "Najbardziej typowym objawem w neuroboreliozie jest:\nA. ostre niedowłady połowicze\nB. napady padaczkowe\nC. porażenie nerwu twarzowego\nD. sztywność karku\nE. drżenie zamiarowe", "a": "C. porażenie nerwu twarzowego (egzamin neurologia II 2026 cykl A-3.docx, pyt. 21)"}, {"chapter": "Badanie neurologiczne", "q": "Badanie neurologiczne: co trzeba pamiętać o: Kolejność?", "a": "Kolejność: wrażenie ogólne, mowa i chód, objawy oponowe, nerwy czaszkowe, układ ruchu, odruchy, czucie, objawy korzeniowe, móżdżek, testy dodatkowe."}, {"chapter": "Badanie neurologiczne", "q": "Badanie neurologiczne: co trzeba pamiętać o: Objawy oponowe?", "a": "Objawy oponowe: sztywność karku, Kernig, Brudziński, Flatau i Herman. W pytaniu egzaminacyjnym łącz je z zapaleniem opon lub krwotokiem podpajęczynówkowym."}, {"chapter": "Badanie neurologiczne", "q": "Badanie neurologiczne: co trzeba pamiętać o: Nerwy czaszkowe ucz się parami funkcji?", "a": "Nerwy czaszkowe ucz się parami funkcji: I węch, II wzrok i dno oka, III-IV-VI ruchy gałek i źrenice, V czucie twarzy i żucie, VII mimika, VIII słuch i równowaga, IX-X gardło i podniebienie, XI SCM/czworoboczny, XII język."}, {"chapter": "Badanie neurologiczne", "q": "Badanie neurologiczne: co trzeba pamiętać o: Skala Lovetta?", "a": "Skala Lovetta: 0 brak skurczu, 1 ślad, 2 ruch w odciążeniu, 3 ruch przeciw grawitacji, 4 ruch przeciw oporowi, 5 norma."}, {"chapter": "Badanie neurologiczne", "q": "Badanie neurologiczne: co trzeba pamiętać o: ten punkt?", "a": "Odruchy: biceps C5-C6, triceps C7, promieniowy C5-C6, kolanowy L3-L4, skokowy S1-S2. Patologiczne: Babiński, Rossolimo, Chaddock, Gordon, Oppenheim."}, {"chapter": "Badanie neurologiczne", "q": "Badanie neurologiczne: co trzeba pamiętać o: Różnicuj Romberga?", "a": "Różnicuj Romberga: pogorszenie po zamknięciu oczu sugeruje czucie głębokie/przedsionek; móżdżek daje niestabilność także przy oczach otwartych."}, {"chapter": "Badanie neurologiczne", "q": "Badanie neurologiczne: co trzeba pamiętać o: ten punkt?", "a": "Język zbacza w stronę uszkodzenia XII, żuchwa w stronę porażoną V, języczek zwykle w stronę zdrową przy IX/X."}, {"chapter": "Badanie neurologiczne", "q": "Badanie neurologiczne: co trzeba pamiętać o: ten punkt?", "a": "Objaw Lasegue'a to ból po tylnej stronie uda przy unoszeniu wyprostowanej kończyny; Mackiewicz prowokuje ból z przodu uda."}, {"chapter": "Badanie neurologiczne", "q": "Badanie neurologiczne: odtwórz fakt ze skryptu zaczynający się od: objaw Flataua - rozszerzenie źrenic przy zgięciu...", "a": "objaw Flataua - rozszerzenie źrenic przy zgięciu karku;"}, {"chapter": "Badania pomocnicze w neurologii", "q": "Badania pomocnicze w neurologii: co trzeba pamiętać o: Punkcja lędźwiowa?", "a": "Punkcja lędźwiowa: zwykle L3-L4, po wykluczeniu wzmożonego ciśnienia śródczaszkowego, zaburzeń krzepnięcia i zakażenia skóry w miejscu wkłucia."}, {"chapter": "Badania pomocnicze w neurologii", "q": "Badania pomocnicze w neurologii: co trzeba pamiętać o: Prawidłowy PMR?", "a": "Prawidłowy PMR: wodojasny, ciśnienie ok. 5-18 cm H2O, białko 0,2-0,4 g/l, glukoza 2,2-3,9 mmol/l lub około 65% surowicy, komórki poniżej 5/ul."}, {"chapter": "Badania pomocnicze w neurologii", "q": "Badania pomocnicze w neurologii: co trzeba pamiętać o: Rozszczepienie białkowo-komórkowe?", "a": "Rozszczepienie białkowo-komórkowe: wysokie białko bez istotnej pleocytozy, klasycznie w zapalnej poliradikulopatii."}, {"chapter": "Badania pomocnicze w neurologii", "q": "Badania pomocnicze w neurologii: co trzeba pamiętać o: ten punkt?", "a": "EEG: alfa 8-13 Hz z tyłu i zanika po otwarciu oczu; beta 14-30 Hz; theta 4-7 Hz; delta 0-3 Hz u czuwającego dorosłego jest patologiczna."}, {"chapter": "Badania pomocnicze w neurologii", "q": "Badania pomocnicze w neurologii: co trzeba pamiętać o: ENG/elektroneurografia?", "a": "ENG/elektroneurografia: zwolnienie przewodzenia wskazuje na demielinizację, spadek amplitudy na uszkodzenie aksonalne."}, {"chapter": "Badania pomocnicze w neurologii", "q": "Badania pomocnicze w neurologii: co trzeba pamiętać o: ten punkt?", "a": "VEP: fala około 100 ms, wydłużenie latencji sugeruje uszkodzenie drogi wzrokowej."}, {"chapter": "Badania pomocnicze w neurologii", "q": "Badania pomocnicze w neurologii: co trzeba pamiętać o: ten punkt?", "a": "BAEP: ocena pnia i nerwu VIII, przydatne m.in. w nerwiaku osłonkowym VIII."}, {"chapter": "Badania pomocnicze w neurologii", "q": "Badania pomocnicze w neurologii: co trzeba pamiętać o: ten punkt?", "a": "SSEP: ocena dróg somatosensorycznych, korzeni, splotów, rdzenia i pnia."}, {"chapter": "Badania pomocnicze w neurologii", "q": "Badania pomocnicze w neurologii: odtwórz fakt ze skryptu zaczynający się od: Pierwsze trzy objawy badamy przy pomocy prób palec-nos i pięta-kolano...", "a": "Pierwsze trzy objawy badamy przy pomocy prób palec-nos i pięta-kolano (zborność tułowia badamy poprzez siadanie z pozycji leżącej bez użycia rąk)."}, {"chapter": "Badania pomocnicze w neurologii", "q": "Badania pomocnicze w neurologii: odtwórz fakt ze skryptu zaczynający się od: w miastenii - badamy apokamnozę - każemy pacjentowi naprzemiennie...", "a": "w miastenii - badamy apokamnozę - każemy pacjentowi naprzemiennie zamykać i otwierać oczy przez około minutę - obserwujemy, czy następuje męczliwość skutkująca brakiem możliwości otworzenia oczu;"}, {"chapter": "Badania pomocnicze w neurologii", "q": "Badania pomocnicze w neurologii: odtwórz fakt ze skryptu zaczynający się od: zaniki mięśniowe i fascykulacje - pojawiają się w uszkodzeniu...", "a": "zaniki mięśniowe i fascykulacje - pojawiają się w uszkodzeniu obwodowego neuronu ruchowego;"}, {"chapter": "Badania pomocnicze w neurologii", "q": "Badania pomocnicze w neurologii: odtwórz fakt ze skryptu zaczynający się od: objaw Lhermitte’a - badamy podobnie jak sztywność karku - pacjent...", "a": "objaw Lhermitte’a - badamy podobnie jak sztywność karku - pacjent zgłasza bolesne przejście „prądu” wzdłuż kręgosłupa - przy uszkodzeniu rdzenia szyjnego (np. w SLA);"}, {"chapter": "Badania pomocnicze w neurologii", "q": "Badania pomocnicze w neurologii: odtwórz fakt ze skryptu zaczynający się od: odruchy deliberacyjne -występują w otępieniach - odruch pyszczkowy,...", "a": "odruchy deliberacyjne -występują w otępieniach - odruch pyszczkowy, objaw dłoniowo-bródkowy, chwyt"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Antidotum dla inhibitorów czynnika Xa (apiksaban, rywaroksaban) to:\nA. Idarucyzumab\nB. Witamina K\nC. PCC (koncentrat czynników zespołu protrombiny) lub Adneksanet alfa\nD. Siarczan Protaminy\nE. Fondaparynuks", "a": "C. PCC (koncentrat czynników zespołu protrombiny) lub Adneksanet alfa (egzamin neurologia 2026 cykl A-2.docx, pyt. 1)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Upośledzenie to polega na niezdolności chorego do wykonania bardziej skomplikowanych, złożonych czynności ruchowych, wymagających zapamiętania pewnych podstawowych umiejętności oraz kolejności ich wykonania. Z reguły dotyczy to czynności nabytych, których chory wcześniej się wyuczył. Wskaż któremu z poniższych pojęć odpowiada ten opis:\nA. agnozja\nB. apraksja\nC. afazja\nD. amnezja\nE. agrafia", "a": "B. apraksja (egzamin neurologia 2026 cykl A-2.docx, pyt. 8)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Niekorzystnym rokowniczo czynnikiem w stwardnieniu rozsianym jest:\nA. Początek choroby < 40 r. życia\nB. Płeć żeńska\nC. Niekompletne ustąpienie objawów pierwszego rzutu\nD. Długi czas pomiędzy pierwszym a drugim rzutem\nE. Brak zmian Gd + w czasie pierwszego rzutu", "a": "C. Niekompletne ustąpienie objawów pierwszego rzutu (egzamin neurologia 2026 cykl A-2.docx, pyt. 9)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "W przypadku udaru niedokrwiennego w zakresie pnia mózgu mogą wystąpić:\nA. Izolowana afazja\nB. Oczopląs i porażenie spojrzenia bocznego\nC. Jednostronna ślepota\nD. Apraksja kończyn\nE. Zespół zaniedbywania przestrzennego", "a": "B. Oczopląs i porażenie spojrzenia bocznego (egzamin neurologia 2026 cykl A-2.docx, pyt. 21)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Który z poniższych objawów NIE JEST charakterystyczny dla zespołu móżdżkowego ?\nA. Dysmetria\nB. Oczopląsjkj\nC. Hipotonia mięśniowa\nD. Wygórowane odruchy ścięgniste\nE. Niezborność ruchowa", "a": "D. Wygórowane odruchy ścięgniste (egzamin neurologia 2026 cykl A-2.docx, pyt. 41)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Typowy obraz wodogłowia normotensyjnego obejmuje triadę objawów:\nA. Drżenie, bradykinezja, sztywność\nB. Zaburzenia chodu, otępienie, nietrzymanie moczu\nC. Zaburzenia wzroku, ataksja, afazja\nD. Bóle głowy, wymioty, diplopia\nE. Dystonia, mioklonie, apraksja", "a": "B. Zaburzenia chodu, otępienie, nietrzymanie moczu (egzamin neurologia 2026 cykl A-2.docx, pyt. 46)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Zaznacz NIEPRAWIDŁOWE stwierdzenie dotyczące zespołów padaczkowych:\nA. przykładem jest zespół Dravet\nB. w większości są genetycznie uwarunkowane\nC. mają typowy wiek zachorowania\nD. maja specyficzny wzorzec BEG\nE. mają ścisły związek z urazami mózgu", "a": "E. mają ścisły związek z urazami mózgu (egzamin neurologia 2026 cykl A-2.docx, pyt. 57)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Balizm najczęściej spowodowany jest uszkodzeniem:\nA. Jądra niskowzgórzowego\nB. Istoty czarnej\nC. Skorupy\nD. Gałki bladej\nE. Wzgórza", "a": "A. Jądra niskowzgórzowego (egzamin neurologia 2026 cykl A-2.docx, pyt. 61)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Zespół Hornera:\nA. wynika z uszkodzenia szlaków współczulnych\nB. wynika z uszkodzenia szlaków przywspółczulnych\nC. objawia się jako opadająca powieka, zaburzenia potowydzielnicze połowy twarzy, zwężenie źrenicy, wrażenie zapadniętej gałki ocznej\nD. + c\nE. b+c", "a": "D. + c (egzamin neurologia 2026 cykl A-2.docx, pyt. 65)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "30-Ietnia pacjentka zgłosiła się na SOR z porażeniem mięśni mimicznych prawej połowy twarzy. Czoło i fałd nosowo-gardłowy sa wygladzone po prawej stronie twarzy, prawy kącik ust opadniety. Pacjentka ma trudności z zamknięciem oka po porażonej stronie twarzy, Przy próbie zamknięcia prawego oka widoczna jest rotacja gałki ocznej na zewnątrz i do göry. Objawy pojawiły się nagle. 2 tygodnie wcześniej pacjentka zaobserwowała u siebie opryszczkę wargowa. Objawy i wywiad sugerują:\nA. Porażenie Bella (obwodowe porażenie CN VII po prawej stronie)\nB. Porażenie Bella (ośrodkowe porażenie CN VII po lewej stronie)\nC. Zespół Guillaina- Barrego\nD. Porażenie nerwu trójdzielnego\nE. Udar mózgu w obrębie prawej półkuli", "a": "A. Porażenie Bella (obwodowe porażenie CN VII po prawej stronie) (egzamin neurologia 2026 cykl A-2.docx, pyt. 67)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Zespół Brown-Sequard'a objawia się jako:\nA. uszkodzenia zniesienie czucia wibracji, propriocepcji i czucia głębokiego po stronie\nB. niedowład spastyczny po stronie uszkodzenia\nC. zniesienie czucia bólu, temperatury i delikatnego dotyku po stronie przeciwnej do uszkodzenia\nD. a+ b+ c\nE. a+ b", "a": "D. a+ b+ c (egzamin neurologia 2026 cykl A-2.docx, pyt. 68)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Skala służąca do oceny niesprawności chorego ze stwardnieniem rozsianym to skala:\nA. UPDRS\nB. EDSS\nC. MMSE\nD. NIHSS\nE. Rankina", "a": "B. EDSS (egzamin neurologia 2026 cykl A-2.docx, pyt. 69)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "W przypadku niedoboru witaminy B12 możemy spotkać się z następującymi objawami ZA WYJĄTKIEM:\nA. Polineuropatii\nB. Zniesienia odruchów głębokich\nC. Zaniku nerwu wzrokowego\nD. Zespołu Hornera\nE. Objawów piramidowych", "a": "D. Zespołu Hornera (egzamin neurologia 2026 cykl A-2.docx, pyt. 75)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Do jakiej struktury neuronatomicznej w pierwszej kolejności dociera większość\nA. informacji z narządów zmysłów, w której są poddawane są analizie i przekazywane dalej do kory mózgowej (struktura ta pelni rolę stacji przekaźnikowej):\nB. hipokamp\nC. gałka blada\nD. wzgórze\nE. prazkowie\nF. wyspa", "a": "D. wzgórze (egzamin neurologia 2026 cykl A-2.docx, pyt. 82)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Wskaż najbardziej charakterystyczny objaw dla symptomatologii stwardnienia rozsianego wynikający z uszkodzenia drogi wzrokowej:\nA. oczopląs\nB. zapalenie pozagałkowe nerwu wzrokowego z mroczkiem środkowym\nC. zaburzenia gałkoruchowe\nD. widzenie przedmiotów jako większe niż w rzeczywistości (makropsja)\nE. całkowity ubytek pola widzenia w dolnych kwadrantach", "a": "B. zapalenie pozagałkowe nerwu wzrokowego z mroczkiem środkowym (egzamin neurologia II 2026 cykl A-3.docx, pyt. 5)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "W udarze w zakresie tętnicy tylno-dolnej móżdżku (PICA) typowo występuje:\nA. ipsilateralne porażenie nerwu twarzowego\nB. kontralateralny niedowład połowiczy\nC. zespół wallenberga (zespół boczny opuszki)\nD. afazja i apraksja\nE. obustronna ślepota", "a": "C. zespół wallenberga (zespół boczny opuszki) (egzamin neurologia II 2026 cykl A-3.docx, pyt. 20)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Pacjentka 45-letnia z niedoczynnością tarczycy i cukrzycą uskarża się na napadowe, uporczywe nocne parestezje w zakresie I-III palca. Rano ma uczucie zdrętwienia i obrzęku ręki. Poruszanie palcami przynosi ulgę. Niedawno zauważyła niewielki zanik mięśni kłębu oraz czucia w tym rejonie. Wypadają jej przedmioty z ręki. Można podejrzewać, że najprawdopodobniej u pacjentki występuje:\nA. uszkodzenie nerwu promieniowego\nB. porażenie splotu ramiennego erba\nC. zespół kanału nadgarstka\nD. radikulopatia c4\nE. borelioza", "a": "C. zespół kanału nadgarstka (egzamin neurologia II 2026 cykl A-3.docx, pyt. 23)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "W przypadku okluzja której tętnicy w udarze niedokrwiennym mózgu, największym prawdopodobieństwem dojdzie do rozwinięcia afazji?\nA. tętnica przednia mózgu (ACA)\nB. tętnica środkowa mózgu (MCA)\nC. tętnica tylna mózgu (PCA)\nD. tętnica kręgowa (VA)\nE. tętnica móżdżkowa górna (SCA)", "a": "B. tętnica środkowa mózgu (MCA) (egzamin neurologia II 2026 cykl A-3.docx, pyt. 31)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Które z poniższych stwierdzeń o tenekteplazie w leczeniu udaru niedokrwiennego jest prawdziwe:\nA. dawkowanie 0,9 mg/kg masy ciała (maksymalnie 25 mg) jednorazowo i.v.\nB. dawkowanie 0,9 mg/kg we wlewie 60 min\nC. dawkowanie 0,25 mg/kg masy ciała (maksymalnie 25 mg) jednorazowo i.v.\nD. może być podawana tylko po TK z kontrastem\nE. jest stosowana wyłącznie u pacjentów <80 r.ż.", "a": "C. dawkowanie 0,25 mg/kg masy ciała (maksymalnie 25 mg) jednorazowo i.v. (egzamin neurologia II 2026 cykl A-3.docx, pyt. 32)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Które parametry w badaniu płynu mózgowo-rdzeniowego są najbardziej typowe dla zakażenia meningokokowego:\nA. wysokie białko, niska glukoza, neutrofilia\nB. niskie białko, wysoka glukoza, limfocytoza\nC. wysokie białko, wysoka glukoza, limfocytoza\nD. niskie białko, niska glukoza, neutrofilia\nE. białko i glukoza prawidłowe, neutrofilia", "a": "A. wysokie białko, niska glukoza, neutrofilia (egzamin neurologia II 2026 cykl A-3.docx, pyt. 33)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "U pacjenta z podejrzeniem ropnia mózgu należy w pierwszej kolejności:\nA. wykonać punkcję lędźwiową\nB. wykonać badanie neuroobrazowe\nC. rozpocząć steroidoterapię\nD. podać acyklowir\nE. oznaczyć płytki", "a": "B. wykonać badanie neuroobrazowe (egzamin neurologia II 2026 cykl A-3.docx, pyt. 34)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Który z poniżej wymienionych leków ma największy potencjał wywołania zespołu zaburzeń kontroli impulsów (ICD):\nA. lewodopa\nB. pramipeksol\nC. entakapon\nD. apomorfina\nE. rasagilina", "a": "B. pramipeksol (egzamin neurologia II 2026 cykl A-3.docx, pyt. 36)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Zespoły neurologiczne i lokalizacja: co trzeba pamiętać o: Zespół piramidowy?", "a": "Zespół piramidowy: niedowład spastyczny, wzmożone napięcie typu scyzorykowego, hiperrefleksja, klonusy, objaw Babińskiego i zanik odruchów powierzchownych."}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Zespoły neurologiczne i lokalizacja: co trzeba pamiętać o: Zespół pozapiramidowy?", "a": "Zespół pozapiramidowy: zaburzenia ruchu bez typowego niedowładu - hipokinezja, sztywność plastyczna, drżenie spoczynkowe, dystonie, pląsawica, tiki, mioklonie."}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Zespoły neurologiczne i lokalizacja: co trzeba pamiętać o: Zespół móżdżkowy?", "a": "Zespół móżdżkowy: ipsilateralna niezborność, dysmetria, drżenie zamiarowe, mowa skandowana, oczopląs, adiadochokineza i chód ataktyczny."}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Zespoły neurologiczne i lokalizacja: co trzeba pamiętać o: Pień mózgu?", "a": "Pień mózgu: myśl o zespołach naprzemiennych - po stronie ogniska objawy nerwu czaszkowego, po stronie przeciwnej objawy piramidowe lub czuciowe."}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Zespoły neurologiczne i lokalizacja: co trzeba pamiętać o: Wzmożone ciśnienie śródczaszkowe?", "a": "Wzmożone ciśnienie śródczaszkowe: ból głowy, nudności/wymioty, tarcza zastoinowa, zaburzenia świadomości, porażenie VI i ryzyko wgłobienia."}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Zespoły neurologiczne i lokalizacja: co trzeba pamiętać o: Afazja Broki?", "a": "Afazja Broki: rozumienie względnie zachowane, mowa niepłynna. Afazja Wernickego: mowa płynna, ale niezrozumiała i zaburzone rozumienie."}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Zespoły neurologiczne i lokalizacja: co trzeba pamiętać o: ten punkt?", "a": "Uszkodzenie neuronu obwodowego daje zaniki i fascykulacje; ośrodkowego - spastyczność i objawy patologiczne."}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Zespoły neurologiczne i lokalizacja: co trzeba pamiętać o: ten punkt?", "a": "Zaburzenia korzeniowe są dermatomalne, splotowe obejmują kilka nerwów, nerw obwodowy ma własny obszar czucia i typowy deficyt ruchowy."}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Zespoły neurologiczne i lokalizacja: odtwórz fakt ze skryptu zaczynający się od: RTG kręgosłupa rutynowo złoty standard gdy potrzebujemy wyniku szybko -...", "a": "RTG kręgosłupa rutynowo złoty standard gdy potrzebujemy wyniku szybko - uraz, udar oraz w nieprawidłowościach kostnych"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Zespoły neurologiczne i lokalizacja: odtwórz fakt ze skryptu zaczynający się od: Niedowład (paresis) lub porażenie (paralysis,...", "a": "Niedowład (paresis) lub porażenie (paralysis, plegia)"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Zespoły neurologiczne i lokalizacja: odtwórz fakt ze skryptu zaczynający się od: Wzmożone napięcie mięśniowe typu kurczowego = spastycznego =...", "a": "Wzmożone napięcie mięśniowe typu kurczowego = spastycznego = scyzorykowego = piramidowego nie w przypadku uszkodzenia na poziomie kory oraz okresu szoku rdzeniowego"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Zespoły neurologiczne i lokalizacja: odtwórz fakt ze skryptu zaczynający się od: Ograniczony niedowład, obejmujący najczęściej jedną kończynę po stronie...", "a": "Ograniczony niedowład, obejmujący najczęściej jedną kończynę po stronie przeciwnej do uszkodzenia"}, {"chapter": "Zespoły neurologiczne i lokalizacja", "q": "Zespoły neurologiczne i lokalizacja: odtwórz fakt ze skryptu zaczynający się od: Niedowład połowiczy z przewagą w kończynie górnej lub porażenie...", "a": "Niedowład połowiczy z przewagą w kończynie górnej lub porażenie połowicze po stronie przeciwnej"}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Najczęstsza przyczyna samoistnego krwotoku śródmózgowego u dorosłych to:\nA. Malformacja tętniczo-żylna (AVM)\nB. Angiopatia amyloidowa\nC. Leczenie trombolityczne\nD. Tętniak workowaty\nE. Nadciśnienie tętnicze", "a": "E. Nadciśnienie tętnicze (egzamin neurologia 2026 cykl A-2.docx, pyt. 2)"}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "W ostrym udarze mózgu pierwszym badaniem obrazowym powinna być:\nA. MRI z dyfuzją\nB. Tomografia komputerowa bez kontrastu\nC. Angio-MR\nD. PET-CT\nE. USG Doppler tętnic szyjnych", "a": "B. Tomografia komputerowa bez kontrastu (egzamin neurologia 2026 cykl A-2.docx, pyt. 3)"}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "U pacjentów z migotaniem przedsionków i dużym ryzykiem krwawienia zaleca się:\nA. jedynie heparynę drobnocząsteczkową w celu uniknięcia zakrzepicy żył kończyn dolnych\nB. jedynie statynę w celu uniknięcia zatoru cholesterolowego z blaszki miażdżycowej\nC. zamknięcie uszka lewego przedsionka\nD. monitorowanie stężeń białka CiS\nE. nimodypinę w celu unikcięcia skurczu naczyniowego w pierwszych 3 dobach", "a": "C. zamknięcie uszka lewego przedsionka (egzamin neurologia 2026 cykl A-2.docx, pyt. 4)"}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "U którego pacjenta z ostrym udarem niedokrwiennym można rozważyć leczenie trombolityczne poza standardowym oknem 4,5 h?\nA. gdy objawy pojawiły się podczas snu, ale MRI pokazuje mismatch DWI-FLAIR\nB. gdy TK wykazuje zmiany niedokrwienne w ostrej fazie\nC. gdy czas wynosi 6 h i nie ma objawów ogniskowych\nD. u każdego pacjenta z migotaniem przedsionków\nE. nigdy-tromboliza dopuszczalna jest jedynie do 4,5 h", "a": "A. gdy objawy pojawiły się podczas snu, ale MRI pokazuje mismatch DWI-FLAIR (egzamin neurologia 2026 cykl A-2.docx, pyt. 5)"}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Kiére stwierdzenie dotyczące otępienia czołowo-skroniowego (FTD, ang frontotemporal dementia) jest prawdziwe?\nA. podstawowym objawem od początku jest izolowana utrata pamięci epizodycznej\nB. na wczesnym etapie w wariancie czołowym dominują zmiany zachowania (odhamowanie, hiperoralnosé, «zachowania użytkownika\") przy względnie zachowanej pamięci\nC. typowy wiek początku objawów to > 75 lat\nD. wariant semantyczny cechuje się płynną mową bez zaburzenia znaczeń stów\nE. MR wykazuje wyłącznie zanik hipokampa, bez zmian w płatach czołowych/skroniowych", "a": "B. na wczesnym etapie w wariancie czołowym dominują zmiany zachowania (odhamowanie, hiperoralnosé, «zachowania użytkownika\") przy względnie zachowanej pamięci (egzamin neurologia 2026 cykl A-2.docx, pyt. 52)"}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Który wynik testu diagnostycznego u pacjentów z ostrym zapaleniem opon mózgowo rdzeniowych jest szybki i najbardziej przydatny de róznicowania etiologii bakteryjnej i wirusowej?\nA. Stężenie glukozy i rodzaj pleocytozy (limfocyty lub leukocyty wielojądrzaste) w PMR\nB. Stężenie białka w płynie mózgowo-rdzeniowym i ciśnienie otwarcia płynu PMR\nC. Wyniki posiewu płynu mózgowo-rdzeniowego na obecność bakterii i wirusów\nD. Tomografia komputerowa mozgu wskazująca na wysokie ciśnienia\nE. + d\nF. 84 Różnego stopnia i rodzaje trudności z identyfikacją bodźców wzrokowych\nG. o pierwotnym oraz wybiórczym charakterze, mimo normalnych (luh nieznacznie zakłóconych ) parametrów fizjologicznych percepej (braku zaburzeń wzroku) to:\nH. agnozja\nI. aleksja\nJ. afazja\nK. amnezja\nL. agrafia\nM. SORu został przyjęty 60-letni mężczyzna znaleziony przez rodzinę leżący w domu na podłodze. Ostatni raz widziany w zdrowiu 3 godziny wcześniej.\nN. W wywiadzie obciążony nadciśnieniem tętniczym, migotaniem przedsionków, cukrzycą i nikotynizmem. W badaniu neurologicznym przytomny, bez kontaktu słownego, ze zwrotem galek ocznych w lewą stronę, afazją czuciowo-ruchową i niedowładem prawych kończyn. W wykonanym pilnie badaniu TK głowy uwidoczniono uogólnione zaniki korowo-podkorowe, poza tym żadnych innych zmian patologicznych. W takim przypadku najbardziej prawdopodobnym rozpoznaniem z poniższych jest:\nO. Udar niedokrwienny mózgu\nP. Udar krwotoczny mózgu\nQ. Guz mózgu\nR. Porażenie Todd'a\nS. Podłoże czynnościowe (symulacja objawów)\nT. Które stwierdzenie dotyczące zespołu pomijania JEST BLĘDNE:\nU. Manifestuje się nieświadomym ignorowaniem strony ciała i/lub przestrzeni otaczającej pacjenta, kontralateralnej w stosunku do miejsca uszkodzenia\nV. Chory nie reaguje na bodźce czuciowe, słuchowe mimo braku ubytków w rodzaju niedowidzenia, niedoczulicy czy niedosłuchu\nW. Chory nie reaguje na bodźce ruchowe po lewej stronie ciala mimo braku ubytków w rodzaju niedowidzenia, niedoczulicy czy niedosłuchu\nX. W większości przypadków dotyczy uszkodzenia prawej półkuli mózgu\nY. Pacjenci postrzegają informacje ze strony pomijane, ale nie są w pełni świadomi tego faktu\nZ. W przypadku świeżego rozpoznania udaru niedokrwiennego mózgu, przy braku przeciwwskazań, po potwierdzeniu zamknięcia pnia jednej z dużych tętnic\n[. mörgowych, rozważać będziemy:\n\\. leczenie neurochirurgiczne\n]. antybiotykoterapię\n^. dożylne leczenie trombolityczne\n_. trombektomię mechaniczną\n`. + d\na. Które z poniższych objawów najczęściej sugeruje udar w zakresie tętnicy\nb. środkowej mózgu (MCA)?\nc. Ataksja kończyn dolnych\nd. Niedowład połowiczy twarzy i kończyn po stronie przeciwnej\ne. Diplopia i oczopląs\nf. Zaburzenia połykania i chrypka\ng. Niedowidzenie połowicze jednoimienne\nh. Typowym objawem udaru w zakresie tętnicy tylnej mózgu (PCA) jest:\ni. Afazja ruchowa\nj. Hemianopsja jednoimienna\nk. Apraksja kończyn\nl. Zespół opuszkowy\nm. Ataksja tułowia\nn. Najczęstszą przyczyną krwotoku podpajęczynówkowego jest:\no. Pęknięcie tętniaka workowatego\np. Malformacja tętniczo-żylna\nq. Uraz głowy\nr. Nadciśnienie tętnicze przewlekłe\ns. Zaburzenia krzepnięcia\nt. Do strukturalnych przyczyn napadów padaczkowych NIE NALEŻY:\nu. wada rozwojowa mózgu\nv. mutacja genetyczna\nw. udar\nx. guz\ny. zmiana pourazowa\nz. Która z etiologii padaczki jest najczęściej stwierdzana u osób w wieku podeszłym?\n{. genetyczna\n|. poinfekcyjna\n}. strukturalna\n~. immunologiczna\n. metaboliczna\n. Które z poniższych stwierdzeń prawidłowo definiuje pojęcie otępienia?\n. jest to krötkotrwale zaburzenie świadomości i uwagi, wynikające z zaburzen metabolicznych\n. jest to zespół zaburzeń funkcji poznawczych, prowadzących do pogorszenia funkcjonowania społecznego i zawodowego, mający charakter przewlekły i zwykle postępujący\n. jest to każdy spadek wyników w przesiewowych testach neuropsychologicznych poniżej normy dla wieku\n. jest to pierwotne zaburzenie ruchowe, w którym objawy poznaweze pojawiają się jedynie wtórnie\n. pojęcie otępienia opisuje wyłącznie chorobę Alzheimera\n. Do chorób i zespołów otępiennych o podłożu pierwotnie neurozwyrodnieniowym NIE NALEŻY:\n. choroba Alzheimera\n. otępienie czołowo-skroniowe\n. otępienie z ciałami Lewy'ego\n. wodogłowie normotensyjne\n. otępienie w chorobie Parkinsona\n. Do objawowych przyczyn otępienia o charakterze nieodwracalnym należy:\n. niedobór witaminy B12\n. niedoczynność tarczycy\n. zmiany naczyniopochodne OUN\n. zaburzenia depresyjne\n. toksyczność leków\n. Zaburzeniami wyższych funkcji korowych związanych z uszkodzeniem plata\n. ciemieniowego są:\n. zaburzenia liczenia i zaburzenia percepcji przestrzennej\n. apatia\n. zaburzenia percepcji wzrokowej\n. zaburzenia pamięci\n. rozhamowanie\n. Wskaż zdanie NIEPRAWDZIWE dotyczące choroby Alzheimera:\n. głównym objawem początkowym są zaburzenia pamięci epizodycznej\n. najczęściej zaczyna się po 65. roku życia\n. charakterystyczne zmiany neuropatologiczne to odkladanie P-amyloidu i bialka tau\n. zaburzenia świadomości są wczesnym i dominującym objawem choroby\n. choroba ma charakter postępujący\n. Wskaż zdanie NIEPRAWIDŁOWE dotyczące leczenia choroby Alzheimera:\n . donepezil jest stosowany w leczeniu objawowym otępienia o łagodnym umiarkowanym nasileniu\n¡. memantyna jest wskazana w otępieniu umiarkowanym do znacznego\n¢. leki prokognitywne hamują rozwój choroby i prowadzą do jej całkowitego wyleczenia\n£. terapie niefarmakologiczne (np. trening poznawczy) wspierają funkcjonowanie pacjenta\n¤. leczenie jest nakierowane na spowolnienie objawów i poprawę jakości życia\n¥. Wskaż prawidłową odpowiedź charakteryzującą otępienie z ciałami Lewy'ego:\n¦. wczesne zaburzenia pamięci epizodycznej są dominującym objawem od początku choroby\n§. fluktuacje funkcji poznawczych z wahaniami uwagi i czujności\n¨. brak objawów pozapiramidowych przez cały okres choroby\n©. brak omamów wzrokowych\nª. nie występują zaburzenia zachowania w fazie snu REM\n«. Uszkodzenie którego szlaku spowoduje przede wszystkim oczopląs i zaburzenia równowagi?\n¬. Móżdżkowo-mostowego\n­. Przedsionkowo-móżdżkowego\n®. Rdzeniowo-móżdżkowego\n¯. Mózgowo-móżdżkowego\n°. Czołowo-mostowo-móżdżkowego", "a": "A. Stężenie glukozy i rodzaj pleocytozy (limfocyty lub leukocyty wielojądrzaste) w PMR (egzamin neurologia 2026 cykl A-2.docx, pyt. 83)"}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Do SORu został przyjęty 60-letni pacjent, mężczyzna znaleziony przez rodzinę, leżący w domu na podłodze. Ostatni raz widziany w zdrowiu 3 godziny wcześniej. W wywiadzie obciążony nadciśnieniem tętniczym, migotaniem przedsionków, cukrzycą i nikotynizmem. W badaniu neurologicznym przytomny, bez kontaktu słownego, ze zwrotem gałek ocznych w lewą stronę, afazją czuciowo-ruchową i niedowładem prawych kończyn. Przyczyną wyżej wymienionych objawów może być:\nA. udar niedokrwienny\nB. krwotok śródmózgowy\nC. guz mózgu\nD. krwiak przymózgowy\nE. hipoglikemia\nF. ropień mózgu\nG. porażenie Todde’a\nH. 1,2\nI. 1,2,3\nJ. 1,2,4\nK. 1,2,3,4,5,6\nL. Wszystkie", "a": "L. Wszystkie (egzamin neurologia II 2026 cykl A-3.docx, pyt. 2)"}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Autosomalnie dominująca artropatia z zawałami podkorowymi i leukoarajozą) jest związany z mutacją genu (CADASIL)\nA. APP\nB. NOTCH3\nC. PSEN1\nD. HTT\nE. CHMP2B", "a": "B. NOTCH3 (egzamin neurologia II 2026 cykl A-3.docx, pyt. 9)"}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Udar lakunarny powstaje najczęściej na tle:\nA. pęknięcia blaszki miażdżycowej w tętnicy szyjnej wewnętrznej\nB. zatoru pochodzenia sercowego\nC. lipohialinozyny drobnych naczyń głębokich\nD. skurczu naczyniowego po krwotoku podpajęczynówkowym\nE. zakrzepicy zatok żylnych mózgu", "a": "C. lipohialinozyny drobnych naczyń głębokich (egzamin neurologia II 2026 cykl A-3.docx, pyt. 16)"}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "U pacjenta z udarem niedokrwiennym i migotaniem przedsionków leczenie przeciwkrzepliwe (NOAC lub warfaryna) należy rozpocząć:\nA. natychmiast po rozpoznaniu udaru\nB. po 1-2 dniach niezależnie od jego rozległości\nC. po 3-14 dniach w zależności od rozmiaru udaru\nD. dopiero po 3 miesiącach\nE. nigdy, ze względu na ryzyko krwawienia śródczaszkowego", "a": "C. po 3-14 dniach w zależności od rozmiaru udaru (egzamin neurologia II 2026 cykl A-3.docx, pyt. 18)"}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Który z poniższych czynników jest bezwzględnym przeciwwskazaniem do … dożylnej alteplazą (rt-PA)?\nA. czas od wystąpienia objawów >4 godzin\nB. cukrzyca z wcześniejszym udarem\nC. wiek powyżej 80 lat\nD. nadciśnienie tętnicze 180/100 mmHg\nE. poziom płytek krwi 90 000/ul", "a": "E. poziom płytek krwi 90 000/ul (egzamin neurologia II 2026 cykl A-3.docx, pyt. 19)"}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Najważniejszym celem postępowania w ostrej fazie krwotoku śródmózgowego jest:\nA. szybkie zwiększenie ciśnienia tętniczego\nB. obniżenie ciśnienia tętniczego w bezpiecznym zakresie\nC. podanie dużych dawek GKS\nD. profilaktyczne podanie leku trombolitycznego\nE. wczesne włączenie heparyny", "a": "B. obniżenie ciśnienia tętniczego w bezpiecznym zakresie (egzamin neurologia II 2026 cykl A-3.docx, pyt. 28)"}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Co jest typowym obrazem MRI we wczesnej fazie udaru niedokrwiennego?\nA. hiperintensywność w T1\nB. hiperintensywność w DWI z obniżeniem w ADC\nC. hipointensywność w DWI z podwyższeniem w ADC\nD. brak zmian przez pierwsze 6 godzin\nE. wzmocnienie po podaniu kontrastu", "a": "B. hiperintensywność w DWI z obniżeniem w ADC (egzamin neurologia II 2026 cykl A-3.docx, pyt. 29)"}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Który lek stosuje się w leczeniu ostrej fazy udaru niedokrwiennego w celu degradacji skrzepliny:\nA. klopidogrel\nB. tenekteplaza\nC. heparyna drobnocząsteczkowa\nD. acenokumarol\nE. kwas acetylosalicylowy", "a": "B. tenekteplaza (egzamin neurologia II 2026 cykl A-3.docx, pyt. 30)"}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Choroby naczyniowe mózgu i rdzenia: co trzeba pamiętać o: ten punkt?", "a": "TIA: przemijający epizod ogniskowych objawów niedokrwiennych bez trwałego zawału; traktuj jako alarm udarowy, nie jako 'łagodny incydent'."}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Choroby naczyniowe mózgu i rdzenia: co trzeba pamiętać o: Udar niedokrwienny?", "a": "Udar niedokrwienny: nagły niedowład, zaburzenia mowy, czucia, widzenia, równowagi; diagnostycznie najpierw obrazowanie, żeby wykluczyć krwotok."}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Choroby naczyniowe mózgu i rdzenia: co trzeba pamiętać o: Mechanizmy?", "a": "Mechanizmy: miażdżyca dużych tętnic, zator sercowopochodny, choroba małych naczyń, rozwarstwienie, koagulopatie i rzadsze zapalenia/naczyniopatie."}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Choroby naczyniowe mózgu i rdzenia: co trzeba pamiętać o: Profilaktyka wtórna?", "a": "Profilaktyka wtórna: leczenie przyczyny, kontrola RR, lipidów, cukrzycy, rzucenie palenia, leki przeciwpłytkowe lub przeciwkrzepliwe zależnie od mechanizmu."}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Choroby naczyniowe mózgu i rdzenia: co trzeba pamiętać o: Krwotok śródmózgowy?", "a": "Krwotok śródmózgowy: częściej ból głowy, wymioty, zaburzenia świadomości i gwałtowne narastanie objawów; typowe tło to nadciśnienie lub angiopatia amyloidowa."}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Choroby naczyniowe mózgu i rdzenia: co trzeba pamiętać o: Udar tętnicy środkowej mózgu?", "a": "Udar tętnicy środkowej mózgu: twarz i kończyna górna, afazja w dominującej półkuli lub zaniedbywanie w niedominującej."}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Choroby naczyniowe mózgu i rdzenia: co trzeba pamiętać o: Udar tętnicy przedniej?", "a": "Udar tętnicy przedniej: kończyna dolna, abulia, zaburzenia zachowania i nietrzymanie moczu."}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Choroby naczyniowe mózgu i rdzenia: co trzeba pamiętać o: Udar tylnego krążenia?", "a": "Udar tylnego krążenia: zawroty, ataksja, dyzartria, diplopia, dysfagia, objawy pniowe i zaburzenia świadomości."}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Choroby naczyniowe mózgu i rdzenia: odtwórz fakt ze skryptu zaczynający się od: a. udar niedokrwienny (85-90%) i. zakrzepowo-zatorowy iii....", "a": "a. udar niedokrwienny (85-90%) i. zakrzepowo-zatorowy iii. hemodynamiczny - ↓ RR i krytyczny spadek regionalnego przepływu mózgowego b. krwotok śródmózgowy (10%)"}, {"chapter": "Choroby naczyniowe mózgu i rdzenia", "q": "Choroby naczyniowe mózgu i rdzenia: odtwórz fakt ze skryptu zaczynający się od: II. Podział wg klasyfikacji TOAST - tło udaru a. choroby dużych naczyń...", "a": "II. Podział wg klasyfikacji TOAST - tło udaru a. choroby dużych naczyń (miażdżycowe) b. choroby małych naczyń (udary zatokowe) c. sercowo-zatorowe d. inne (rzadkie) przyczyny e. nieustalone (zwykle mieszane)"}, {"chapter": "Infekcje OUN", "q": "Które parametry w badaniu płynu mózgowo-rdzeniowego sugerują wirusowe zapalenie opon mózgowo-rdzeniowych:\nA. glukoza <40 mg/dl, białko >200 mg/dl, neutrofilia\nB. glukoza prawidłowa, następstwo lekkiego uszkodzenia, limfocytoza\nC. glukoza niska, białko prawidłowe, limfocytoza\nD. glukoza podwyższona, białko niskie, neutrofilia\nE. glukoza i białko prawidłowe, brak pleocytozy", "a": "B. glukoza prawidłowa, następstwo lekkiego uszkodzenia, limfocytoza (egzamin neurologia 2026 cykl A-2.docx, pyt. 6)"}, {"chapter": "Infekcje OUN", "q": "Które stwierdzenie dotyczące empirycznego leczenia bakteryjnego ZOMR u dorosłych jest prawidłowe: oo\nA. Ceftriakson + wankomycyna acyklowir\nB. Ceftriakson + wankomycyna +/- ampicylina\nC. Ceftriakson monoterapia\nD. Ciprofloksacyna + wankomycyna\nE. Cefazolina + acyklowir", "a": "B. Ceftriakson + wankomycyna +/- ampicylina (egzamin neurologia 2026 cykl A-2.docx, pyt. 7)"}, {"chapter": "Infekcje OUN", "q": "Który z poniższych objawów jest najbardziej typowy dla zapalenia opon mózgowo-rdzeniowych?\nA. Drżenie spoczynkowe\nB. Sztywność karku\nC. Ataksja tułowia\nD. Zaburzenia pamięci krótkotrwałej\nE. Oczopląs poziomy", "a": "B. Sztywność karku (egzamin neurologia 2026 cykl A-2.docx, pyt. 18)"}, {"chapter": "Infekcje OUN", "q": "Które drobnoustroje są najczęstszą przyczyną wirusowego zapalenia opon mózgowo-rdzeniowych?\nA. Wirusy opryszczki (HSV-1, HSV-2)\nB. Enterowirusy (echowirusy, Coxsackie)\nC. Wirus Epsteina-Barr\nD. Cytomegalowirus\nE. HIV", "a": "B. Enterowirusy (echowirusy, Coxsackie) (egzamin neurologia 2026 cykl A-2.docx, pyt. 20)"}, {"chapter": "Infekcje OUN", "q": "Zmiany w placie skroniowym w MRI, drgawki i zaburzenia Świadomości są najbardziej charakterystyczne dla:\nA. Wirusowego zapalenia opon wywołanego przez enterowirusy\nB. Opryszczkowego zapalenia mózgu (HSV-I)\nC. Neuroboreliozy\nD. Zapalenia mózgu w przebiegu HIV\nE. Zapalenia opon gruźliczego", "a": "B. Opryszczkowego zapalenia mózgu (HSV-I) (egzamin neurologia 2026 cykl A-2.docx, pyt. 71)"}, {"chapter": "Infekcje OUN", "q": "Infekcje OUN: co trzeba pamiętać o: Ostre bakteryjne ZOMR?", "a": "Ostre bakteryjne ZOMR: gorączka, ból głowy, sztywność karku, zaburzenia świadomości; PMR zwykle neutrofilowy, białko wysokie, glukoza niska."}, {"chapter": "Infekcje OUN", "q": "Infekcje OUN: co trzeba pamiętać o: Wirusowe ZOMR?", "a": "Wirusowe ZOMR: łagodniejsze, PMR limfocytarny, glukoza zwykle prawidłowa, białko umiarkowanie podwyższone."}, {"chapter": "Infekcje OUN", "q": "Infekcje OUN: co trzeba pamiętać o: Gruźlicze i grzybicze ZOMR?", "a": "Gruźlicze i grzybicze ZOMR: przebieg podostry/przewlekły, limfocyty, wysokie białko i często obniżona glukoza."}, {"chapter": "Infekcje OUN", "q": "Infekcje OUN: co trzeba pamiętać o: Zapalenie mózgu?", "a": "Zapalenie mózgu: oprócz objawów oponowych pojawia się zaburzenie świadomości, osobowości, napady, objawy ogniskowe; HSV kojarz z płatem skroniowym."}, {"chapter": "Infekcje OUN", "q": "Infekcje OUN: co trzeba pamiętać o: Ropień mózgu?", "a": "Ropień mózgu: triada bywa niepełna - ból głowy, gorączka, deficyt ogniskowy; w obrazie efekt masy i wzmacniająca się torebka."}, {"chapter": "Infekcje OUN", "q": "Infekcje OUN: co trzeba pamiętać o: Meningitis = opony?", "a": "Meningitis = opony: ból głowy, gorączka, sztywność karku. Encephalitis = mózg: świadomość, napady, osobowość, ognisko."}, {"chapter": "Infekcje OUN", "q": "Infekcje OUN: co trzeba pamiętać o: ten punkt?", "a": "Niska glukoza w PMR najbardziej pcha w stronę bakteryjnego, gruźliczego, grzybiczego lub nowotworowego procesu."}, {"chapter": "Infekcje OUN", "q": "Infekcje OUN: co trzeba pamiętać o: Nie czekaj z myśleniem o HSV przy zapaleniu mózgu z objawami skroniowymi.?", "a": "Nie czekaj z myśleniem o HSV przy zapaleniu mózgu z objawami skroniowymi."}, {"chapter": "Infekcje OUN", "q": "Infekcje OUN: odtwórz fakt ze skryptu zaczynający się od: Choroby infekcyjne mózgu, opon mózgowo-rdzeniowych i rdzenia...", "a": "Choroby infekcyjne mózgu, opon mózgowo-rdzeniowych i rdzenia kręgowego"}, {"chapter": "Infekcje OUN", "q": "Infekcje OUN: odtwórz fakt ze skryptu zaczynający się od: Zapalenie opon mózgowo-rdzeniowych, mózgu i...", "a": "Zapalenie opon mózgowo-rdzeniowych, mózgu i rdzenia"}, {"chapter": "Infekcje OUN", "q": "Infekcje OUN: odtwórz fakt ze skryptu zaczynający się od: Procesy zapalne rozwijające się podtwardówkowo i obejmujące głównie...", "a": "Procesy zapalne rozwijające się podtwardówkowo i obejmujące głównie tkanki opony pajęczej i naczyniowej. W każdym przypadku, w mniejszym lub większym stopniu, zajęte są tkanki mózgowia i/lub RK."}, {"chapter": "Infekcje OUN", "q": "Infekcje OUN: odtwórz fakt ze skryptu zaczynający się od: zaburzenia świadomości objawy oponowe (+) - początkowo Brudziński,...", "a": "zaburzenia świadomości objawy oponowe (+) - początkowo Brudziński, potem bolesność gałek ocznych i Kernig objawy uszkodzenia NC (gdy opony podstawy mózgu) - zaburzenia okoruchowe, źrenicze, NC VII"}, {"chapter": "Choroby demielinizacyjne", "q": "Wybierz zdanie, które NIEPRAWIDŁOWO charakteryzuje ostre rozsiane zapalenie mózgu i rdzenia (ADEM):\nA. monofazowe, zapalno-demielinizacyjne schorzenie OUN o podłożu autoimmunologicznym,\nB. patogenezy zmian upatruje się w zjawisku molekularnej mimikry.\nC. choroba występuje znacznie częściej u dzieci niż u dorosłych,\nD. w badaniu MR obserwuje się symetryczne lub asymetryczne rozsiane zmiany demielinizacyjne w istocie białej półkul, ale nie w miejscach typowych dla SM,\nE. częsty jest przebieg rzutowy", "a": "E. częsty jest przebieg rzutowy (egzamin neurologia 2026 cykl A-2.docx, pyt. 19)"}, {"chapter": "Choroby demielinizacyjne", "q": "U chorego z afazją Broki, niedowładem połowiczym twarzy i kończyn po stronie prawej oraz odchyleniem głowy w lewo uszkodzona jest najprawdopodobniej:\nA. Lewa tętnica środkowa mózgu\nB. Prawa tętnica środkowa mózgu\nC. Lewa tętnica tylna mózgu\nD. Lewa tętnica przednia mózgu\nE. Prawa tętnica podstawna", "a": "A. Lewa tętnica środkowa mózgu (egzamin neurologia 2026 cykl A-2.docx, pyt. 22)"}, {"chapter": "Choroby demielinizacyjne", "q": "Stwardnienie rozsiane (SM) to:\nA. pierwotne zapalno-demielinizacyjne, przewlekłe schorzenie OUN o podłożu autoimmunologicznym\nB. choroba nerwów obwodowych z dominującą neuropatią aksonalną bez procesu zapalnego\nC. wyłącznie choroba neurodegeneracyjna bez cech zapalenia ani demielinizacji\nD. uogólniona miopatia mitochondrialna\nE. idiopatyczna choroba jednoogniskowa istoty szarej mózgu", "a": "A. pierwotne zapalno-demielinizacyjne, przewlekłe schorzenie OUN o podłożu autoimmunologicznym (egzamin neurologia 2026 cykl A-2.docx, pyt. 23)"}, {"chapter": "Choroby demielinizacyjne", "q": "Najwcześniej wykazany związek genetyczny SM dotyczyl regionu chromosomu:\nA. 7q31\nB. 19q13 (APOE)\nC. 1p36\nD. 17q21\nE. бp21 (geny HLA)", "a": "E. бp21 (geny HLA) (egzamin neurologia 2026 cykl A-2.docx, pyt. 24)"}, {"chapter": "Choroby demielinizacyjne", "q": "Prążki oligoklonalne w płynie mózgowo-rdzeniowym w stwardnieniu rozsianym:\nA. są obecne u >90% chorych, odzwierciedlają wewnątrzmózgowa syntezę immunoglobulin, ale nie są swoiste dla SM\nB. występują wyłącznie w SM i znikają po leczeniu immunomodulacyjnym\nC. ich brak wyklucza rozpoznanie SM\nD. obecne są tylko w czasie rzutu i ściśle korelują z nasileniem objawów\nE. powstają wyłącznie przeciw wirusom odry i różyczki", "a": "A. są obecne u >90% chorych, odzwierciedlają wewnątrzmózgowa syntezę immunoglobulin, ale nie są swoiste dla SM (egzamin neurologia 2026 cykl A-2.docx, pyt. 25)"}, {"chapter": "Choroby demielinizacyjne", "q": "Standardowe leczenie ostrego rzutu SM obejmuje:\nA. doustny prednizon 5 mg/d przez 14 dni jako jedyne leczenie\nB. dożylne podanie metylprednizolonu 0,5-1 g/d przez 3-5 dni\nC. pulsacyjną cyklofosfamidoterapię jako leczenie pierwszego wyboru\nD. dorażne podwojenie dawki interferonu ß\nE. wyłącznie plazmaferezę w pierwszej kolejności", "a": "B. dożylne podanie metylprednizolonu 0,5-1 g/d przez 3-5 dni (egzamin neurologia 2026 cykl A-2.docx, pyt. 26)"}, {"chapter": "Choroby demielinizacyjne", "q": "Do kryteriów „rozsiania w czasie\" wg kryteriów diagnostycznych stwardnienia rozsianego (McDonalda z 2017 r.) należą:\nA. wystąpienie kolejnego rzutu choroby\nB. obecność oligoklonalnych prążków Ig w płynie mózgowo-rdzeniowym\nC. obecność nowej zmiany demielinizacyjnej w badaniu rezonansowym\nD. obecnośé zarówno zmian nieaktywnych oraz aktywnych (wzmacniających się po podaniu kontrastu) w badaniu rezonansowym\nE. wszystkie powyższe", "a": "E. wszystkie powyższe (egzamin neurologia 2026 cykl A-2.docx, pyt. 27)"}, {"chapter": "Choroby demielinizacyjne", "q": "Połącz jednostkę chorobową z typową cechą. Która z poniższych kombinacji jest prawidlowa?\nA. NMO - przeciwciała anty-AQP4; ADEM - jednoczasowe ogniska Gd(+) o monofazowym przebiegu; PML - reaktywacja wirusa JC i ogniska T2/FLAIR często bez wzmocnienia\nB. NMO - przeciwciała anty-MOG; ADEM - przewlekle postępujący przebieg: PML - częste uszkodzenie nerwów wzrokowych\nC. NMO - zajęcie głównie kory mózgu; ADEM - brak związku z infekcjami/szczepieniami; PML - etiologia EBV\nD. NMO - zawsze pełny powrót do stanu wyjściowego po rzucie; ADEM - dominują neuralgie trójdzielne; PML - zwykle silne wzmocnienie kontrastowe\nE. NMO - ścisły związek z HLA-B27; ADEM - stała obecność OCB; PML-skutecznie leczona cytarabiną", "a": "A. NMO - przeciwciała anty-AQP4; ADEM - jednoczasowe ogniska Gd(+) o monofazowym przebiegu; PML - reaktywacja wirusa JC i ogniska T2/FLAIR często bez wzmocnienia (egzamin neurologia 2026 cykl A-2.docx, pyt. 28)"}, {"chapter": "Choroby demielinizacyjne", "q": "Zespöl Millarda-Gublera objawia się jako:\nA. porażenie okruchowe po stronie uszkodzenia z towarzyszącym niedowładem połowiczym po stronie przeciwnej\nB. porażenie mięśni języka po stronie przeciwnej do uszkodzenia z towarzyszącym niedowładem połowiczym po stronie uszkodzenia\nC. porażenie okoruchowe po stronie przeciwnej do uszkodzenia z towarzyszącym niedowładem połowiczym po stronie przeciwnej\nD. obwodowy niedowład mięśni twarzy po stronie uszkodzenia z towarzyszącym niedowładem połowiczym po stronie przeciwnej\nE. porażenie skojarzonego spozierania ku górze i dołu z towarzyszącym brakiem reakcji źrenic na światło i zachowaną reakcją źrenic na światło", "a": "D. obwodowy niedowład mięśni twarzy po stronie uszkodzenia z towarzyszącym niedowładem połowiczym po stronie przeciwnej (egzamin neurologia 2026 cykl A-2.docx, pyt. 63)"}, {"chapter": "Choroby demielinizacyjne", "q": "Wybierz zdanie, które NIEPRAWIDŁOWO charakteryzuje chorobę neuromyelitis optica (NMOSD):\nA. jest autoimmunologiczne, demielinizacyjno-nekrotycznym schorzenie uszkadzające nerwy wzrokowe i rdzen kręgowy,\nB. po przebytym rzucie choroby pozostaje zwykle znacznego stopnia deficyt neurologi
