<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKRYPT MAXA - Szybkiuploader do Firebase</title>
    <link rel="stylesheet" href="https://unpkg.com/tailwindcss@^3/dist/tailwind.min.css">
</head>
<body class="bg-gray-900 text-gray-100 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="bg-gray-800 border border-gray-700 p-6 rounded-xl w-full max-w-2xl shadow-2xl">
        <header class="text-center mb-6">
            <h1 class="text-3xl font-extrabold text-blue-500 tracking-tight mb-1">NEURO-CONVERTER</h1>
            <p class="text-gray-400 text-sm">Masowe wgrywanie pytań strukturalnych bezpośrednio do Firestore</p>
        </header>
        
        <div class="mb-4">
            <label class="block text-sm text-gray-400 mb-1 font-semibold">Identyfikator egzaminu w bazie danych:</label>
            <input type="text" id="admin-exam-id" placeholder="np. 2026_A_1 (dla I terminu) lub 2026_A_2 (dla II terminu)" class="w-full bg-gray-700 text-white p-3 rounded-lg border border-gray-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="mb-4">
            <label class="block text-sm text-gray-400 mb-1 font-semibold">Wklej surowy tekst pytań (według przygotowanego schematu):</label>
            <textarea id="admin-raw-text" rows="12" placeholder="1. Pytanie...&#10;Opcja A&#10;Opcja B&#10;Odp: A" class="w-full bg-gray-700 text-white p-3 rounded-lg border border-gray-600 font-mono text-xs focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

        <div class="flex flex-col sm:flex-row justify-between items-center gap-4 border-t border-gray-700 pt-4">
            <span id="admin-status" class="text-sm font-bold text-yellow-400 text-center sm:text-left">Status: Oczekiwanie na dane...</span>
            <button id="upload-btn" class="w-full sm:w-auto bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-8 rounded-lg transition-colors shadow-lg transform active:scale-95">
                Konwertuj i Wyślij do Firebase
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Twoje dane połączenia z Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyDUlxtOEXNjaQ4-axL_urNg3wbvUxMtGy8",
            authDomain: "baza-neuro.firebaseapp.com",
            projectId: "baza-neuro",
            storageBucket: "baza-neuro.firebasestorage.app",
            messagingSenderId: "178416106866",
            appId: "1:178416106866:web:d021a5f98027ac3ac3b1eb",
            measurementId: "G-VD1GG66PDD"
        };

        // Inicjalizacja usług
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('upload-btn').addEventListener('click', async () => {
            const examId = document.getElementById('admin-exam-id').value.trim();
            const rawText = document.getElementById('admin-raw-text').value;
            const statusSpan = document.getElementById('admin-status');

            if (!examId || !rawText) {
                alert("Proszę podać identyfikator egzaminu oraz wkleić treść pytań!");
                return;
            }

            statusSpan.innerText = "Status: Parsowanie i podział tekstu...";
            
            try {
                // Podział tekstu na linie z oczyszczeniem z pustych spacji
                const lines = rawText.split('\n').map(l => l.trim()).filter(l => l.length > 0);
                let questions = [];
                let currentQ = null;
                let order = 1;

                for (let line of lines) {
                    // Detekcja nowego pytania (np. "1.", "45)")
                    if (/^\d+[\.\)]/.test(line)) {
                        if (currentQ) questions.push(currentQ);
                        currentQ = { 
                            text: line.replace(/^\d+[\.\)]\s*/, ''), 
                            options: [], 
                            correct: 0, 
                            order: order++ 
                        };
                    } else if (currentQ) {
                        // Detekcja linii oznaczającej klucz odpowiedzi
                        if (line.toLowerCase().startsWith('odp:') || line.toLowerCase().startsWith('poprawna:')) {
                            const letter = line.replace(/[^a-eA-E]/g, '').toUpperCase();
                            if (letter) currentQ.correct = letter.charCodeAt(0) - 65; // Zamiana liter A-E na cyfry 0-4
                        } else {
                            // Czyszczenie ewentualnych prefiksów "A. Tekst" -> "Tekst"
                            const cleanOption = line.replace(/^[A-Ea-e][\.\)\s]+/, '');
                            currentQ.options.push(cleanOption);
                        }
                    }
                }
                if (currentQ) questions.push(currentQ);

                if (questions.length === 0) {
                    statusSpan.className = "text-sm font-bold text-red-400";
                    statusSpan.innerText = "Status: Błąd! Nie wykryto pytań. Sprawdź formatowanie.";
                    return;
                }

                // Bezpośrednie sekwencyjne wgrywanie paczek do bazy
                let count = 0;
                for (let q of questions) {
                    statusSpan.className = "text-sm font-bold text-yellow-400";
                    statusSpan.innerText = `Status: Wgrywanie ${count + 1} z ${questions.length}...`;
                    
                    // Każde pytanie dostaje osobny, losowy ID w wybranej ścieżce
                    const docRef = doc(collection(db, `egzaminy/${examId}/pytania`));
                    await setDoc(docRef, q);
                    count++;
                }
                
                statusSpan.className = "text-sm font-bold text-green-400";
                statusSpan.innerText = `Status: Sukces! Wgrano poprawnie ${count} pytań.`;
                document.getElementById('admin-raw-text').value = ""; // Czyszczenie okna po sukcesie
                
            } catch (err) {
                console.error(err);
                statusSpan.className = "text-sm font-bold text-red-400";
                statusSpan.innerText = `Status: Błąd bazy! ${err.message}`;
            }
        });
    </script>
</body>
</html>
